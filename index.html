<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Фінанси">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="%230a0a0a"/><text x="50" y="68" font-family="Georgia,serif" font-size="58" font-weight="600" text-anchor="middle" fill="%23d4a574">₴</text></svg>'>
<link rel="apple-touch-icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180"><rect width="180" height="180" rx="40" fill="%230a0a0a"/><text x="90" y="122" font-family="Georgia,serif" font-size="105" font-weight="600" text-anchor="middle" fill="%23d4a574">₴</text></svg>'>
<title>Фінанси</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     RESET & TOKENS
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overscroll-behavior-y: contain; }
  button { background: none; border: none; cursor: pointer; color: inherit; font: inherit; }
  input, select, textarea { font: inherit; color: inherit; background: none; border: none; outline: none; }
  ul, ol { list-style: none; }

  :root, html[data-theme="dark"] {
    --bg:        #0a0a0a;
    --surface:   #161616;
    --surface-2: #1f1f1f;
    --border:    #2a2a2a;
    --border-2:  #3a3a3a;
    --text:      #ededed;
    --text-2:    #a8a8a8;
    --text-3:    #6a6a6a;
    --accent:    #d4a574;
    --accent-dim:#3a2e1c;
    --income:    #7d9b7d;
    --expense:   #c87858;
    --transfer:  #7a8aa3;
    --danger:    #c45454;
    --danger-dim:#3a1c1c;
  }

  html[data-theme="light"] {
    --bg:        #f5f1ea;
    --surface:   #ebe5db;
    --surface-2: #e0d9cc;
    --border:    #d8d0c2;
    --border-2:  #c0b6a4;
    --text:      #2a2620;
    --text-2:    #6a6258;
    --text-3:    #98907f;
    --accent:    #a8783e;
    --accent-dim:#f0e6d4;
    --income:    #5a7a5a;
    --expense:   #a85a3a;
    --transfer:  #5a6a85;
    --danger:    #a04040;
    --danger-dim:#f5d8d8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }

  .serif { font-family: 'Fraunces', Georgia, serif; }
  .num { font-variant-numeric: tabular-nums; }
  .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); }
  .muted { color: var(--text-2); }

  /* ============================================================
     LAYOUT
     ============================================================ */
  #app {
    max-width: 640px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    padding-bottom: 64px; /* room for nav */
  }

  /* HEADER */
  header.app-head {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
  }
  header.app-head .top {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px;
  }
  header.app-head h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: -0.02em;
  }
  header.app-head .month {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-3);
  }
  header.app-head .summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4px;
  }
  header.app-head .cell .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-3); margin-bottom: 4px; }
  header.app-head .cell .val { font-family: 'Fraunces', serif; font-size: 17px; font-variant-numeric: tabular-nums; font-weight: 500; }
  header.app-head .head-hint {
    margin-top: 10px;
    font-size: 10px;
    color: var(--text-3);
    text-align: right;
    font-style: italic;
  }

  /* VIEW MAIN */
  main {
    flex: 1;
    padding: 18px 20px 100px;
  }
  .view-title {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .view-sub { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-3); margin-bottom: 18px; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-3);
  }
  .empty .title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-style: italic;
    margin-bottom: 6px;
    color: var(--text-2);
  }
  .empty .hint { font-size: 13px; }

  /* FAB */
  .fab {
    position: fixed;
    right: 20px;
    bottom: 84px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    z-index: 5;
    transition: transform 0.12s;
  }
  .fab:active { transform: scale(0.94); }

  /* BOTTOM NAV */
  nav.tabs {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 4;
  }
  nav.tabs .container {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    width: 100%;
  }
  nav.tabs button {
    flex: 1;
    padding: 10px 0 12px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: var(--text-3);
    transition: color 0.15s;
  }
  nav.tabs button.active { color: var(--accent); }
  nav.tabs .tab-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; }

  /* SECTION HEADERS */
  .section-head {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-3);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  section { margin-bottom: 28px; }

  /* TRANSACTION ROW */
  .tx-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  .tx-row:active { background: var(--surface); }
  .tx-row .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }
  .tx-row .body { flex: 1; min-width: 0; }
  .tx-row .top { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
  .tx-row .name { font-size: 14.5px; font-weight: 500; }
  .tx-row .amount { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .tx-row .amount.income { color: var(--income); }
  .tx-row .amount.expense { color: var(--expense); }
  .tx-row .amount.transfer { color: var(--transfer); font-size: 14px; }
  .tx-row .meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* ACCOUNT CARD */
  .acc-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    transition: background 0.12s;
  }
  .acc-card:active { background: var(--surface-2); }
  .acc-card .swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
  .acc-card .info { flex: 1; min-width: 0; }
  .acc-card .name { font-size: 14.5px; font-weight: 500; }
  .acc-card .cur { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em; }
  .acc-card .balance { font-family: 'Fraunces', serif; font-size: 18px; font-variant-numeric: tabular-nums; font-weight: 500; text-align: right; }

  .totals {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 18px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .totals .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-3); }
  .totals .val { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--accent); }

  /* TOTALS MULTI (per-currency) */
  .totals-multi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    margin-bottom: 18px;
  }
  .totals-multi .totals-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .totals-multi .totals-row:last-child { border-bottom: none; }
  .totals-multi .totals-row .lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-3);
  }
  .totals-multi .totals-row .val {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
  }

  /* VIEW CURRENCY PICKER (top of accounts tab) */
  .view-cur-picker {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 14px;
  }
  .view-cur-picker button {
    padding: 8px 0;
    border-radius: 6px;
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--text-3);
    transition: all 0.15s;
  }
  .view-cur-picker button.active {
    background: var(--accent-dim);
    color: var(--accent);
  }

  /* TOTALS HERO (single big balance) */
  .totals-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 10px;
    text-align: center;
  }
  .totals-hero .lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-3);
    margin-bottom: 6px;
  }
  .totals-hero .val {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  /* TOTALS BY CURRENCY (small panel under hero) */
  .totals-by-cur {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 18px;
  }
  .totals-by-cur-head {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-3);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .totals-by-cur-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
  }
  .totals-by-cur-row .cur-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-3);
  }
  .totals-by-cur-row .cur-val {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
  }

  /* GOAL CARD */
  .goal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    transition: background 0.12s;
  }
  .goal-card:active { background: var(--surface-2); }
  .goal-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .goal-top .swatch { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }
  .goal-name { flex: 1; font-size: 14.5px; font-weight: 500; }
  .goal-pct {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
  }
  .goal-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .goal-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease-out;
  }
  .goal-nums {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    font-family: 'Fraunces', serif;
    font-size: 14px;
  }
  .goal-nums .muted { color: var(--text-3); font-weight: 400; }
  .goal-desc {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 6px;
    font-style: italic;
  }

  /* RATES SETTINGS */
  .rates-hint {
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-2);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .rate-row {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .rate-row:last-of-type { border-bottom: none; }
  .rate-label {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .rate-eur {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-2);
    flex-shrink: 0;
    min-width: 50px;
  }
  .rate-eq { color: var(--text-3); font-size: 14px; }
  .rate-input {
    flex: 1;
    padding: 10px 12px;
    font-family: 'Fraunces', serif;
    font-size: 15px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .rate-cur {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.12em;
    flex-shrink: 0;
    min-width: 30px;
  }
  .rates-tip {
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-3);
    font-style: italic;
  }

  /* ACCOUNT DETAIL */
  .detail-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .detail-head .back {
    color: var(--accent);
    font-size: 14px;
    padding: 4px 0;
  }
  .detail-head .del-acc-btn {
    color: var(--text-3);
    padding: 6px;
    transition: color 0.15s;
  }
  .detail-head .del-acc-btn:active { color: var(--danger); }
  .detail-head-actions {
    display: flex;
    gap: 4px;
  }
  .icon-btn {
    color: var(--text-3);
    padding: 8px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .icon-btn:active { color: var(--accent); background: var(--surface); }
  .icon-btn.danger-hover:active { color: var(--danger); }
  .detail-hero {
    text-align: center;
    padding: 14px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 18px;
  }
  .detail-name-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .detail-name-row .swatch { width: 12px; height: 12px; border-radius: 4px; }
  .detail-name {
    font-size: 20px;
    font-weight: 500;
  }
  .detail-balance {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 2px;
  }
  .detail-cur {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-3);
  }

  /* ACC STATS (in account detail) */
  .acc-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 22px;
  }
  .acc-stats-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .acc-stats-head {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-3);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .acc-stats-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 4px 0;
    gap: 6px;
  }
  .acc-stats-row .lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
  }
  .acc-stats-row .val {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-weight: 500;
  }

  /* Scheduled stats — slightly dimmed, separate row */
  .acc-stats-scheduled {
    margin-top: -10px;
    margin-bottom: 22px;
  }
  .acc-stats-scheduled .acc-stats-head {
    color: var(--accent);
  }
  .projected-balance {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    margin-top: 4px;
  }
  .projected-note {
    font-size: 10px;
    color: var(--text-3);
    margin-top: 4px;
    font-style: italic;
    line-height: 1.3;
  }

  /* TX PREVIEW (inside modal) */
  .tx-preview-amount {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 600;
    letter-spacing: -0.02em;
    text-align: center;
    padding: 8px 0 20px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .tx-preview-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .tx-preview-row:last-child { border-bottom: none; }
  .tx-preview-row .lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-3);
    flex-shrink: 0;
  }
  .tx-preview-row .val {
    font-size: 14px;
    text-align: right;
    word-break: break-word;
  }

  /* CATEGORY ROW */
  .cat-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .cat-row .swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .cat-row .name { flex: 1; font-size: 14px; }
  .cat-row .type { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); padding: 3px 7px; border: 1px solid var(--border-2); border-radius: 4px; }
  .cat-row .type.income { color: var(--income); border-color: var(--income); opacity: 0.7; }
  .cat-row .type.expense { color: var(--expense); border-color: var(--expense); opacity: 0.7; }
  .cat-row .del { color: var(--text-3); padding: 8px; transition: color 0.15s; border-radius: 4px; }
  .cat-row .del:active { color: var(--accent); background: var(--surface); }

  /* Archived row styling (used in cat-row and acc-card) */
  .archived-row {
    opacity: 0.85;
  }
  .type-pill {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-3);
    padding: 3px 7px;
    border: 1px solid var(--border-2);
    border-radius: 4px;
  }

  /* SETTINGS TABS */
  .stab-bar {
    display: flex;
    gap: 2px;
    background: var(--surface);
    padding: 3px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .stab-bar button {
    flex: 1;
    padding: 9px 0;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--text-2);
    border-radius: 6px;
    transition: background 0.15s;
  }
  .stab-bar button.active { background: var(--bg); color: var(--text); }

  .stab-bar.stab-bar-4 button { font-size: 10px; padding: 9px 0; }
  .stab-bar.stab-bar-5 button { font-size: 9px; padding: 9px 0; letter-spacing: 0.02em; }

  .events-explainer {
    margin-top: 22px;
    padding: 14px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.5;
  }

  .event-count {
    font-size: 10px;

function exportBackup() {
  const today = todayISO();
  const filename = `finance-backup-${today}.json`;
  const payload = {
    appVersion: APP_VERSION,
    exportedAt: new Date().toISOString(),
    data: state.data
  };
  const json = JSON.stringify(payload, null, 2);

  // Try Web Share API with file directly (no canShare check — it returns false on some
  // Android versions even though share({ files }) actually works).
  if (navigator.share && typeof File !== 'undefined') {
    const file = new File([json], filename, { type: 'application/json' });
    navigator.share({
      files: [file],
      title: 'Бекап Фінансів',
      text: `Бекап на ${today}`
    }).then(() => {
      state.data.lastBackupAt = new Date().toISOString();
      saveData();
      render();
    }).catch(err => {
      if (err && err.name === 'AbortError') return;  // User cancelled — do nothing
      // share({ files }) not supported on this device — fallback to download
      downloadFile(filename, json);
      state.data.lastBackupAt = new Date().toISOString();
      saveData();
      state.modal = 'backupSaved';
      state.modalCtx = filename;
      render();
    });
    return;
  }

  // No Share API at all — plain download + instructions
  downloadFile(filename, json);
  state.data.lastBackupAt = new Date().toISOString();
  saveData();
  state.modal = 'backupSaved';
  state.modalCtx = filename;
  render();
}

function importBackup(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      // Accept either {data: {...}} (new format) or raw state (manual edits)
      const newData = parsed.data || parsed;
      if (!newData || !Array.isArray(newData.accounts) || !Array.isArray(newData.transactions)) {
        state.modal = 'infoBlocked';
        state.modalCtx = 'Файл не схожий на бекап Фінансів. Перевір, що це правильний JSON-файл, експортований з цієї апки.';
        render();
        return;
      }
      // Run through migrate to ensure all fields exist on older backups
      state.data = migrate(newData);
      saveData();
      applyTheme();
      state.view = 'transactions';
      state.subView = null;
      state.modal = 'infoRestored';
      state.modalCtx = `Відновлено: ${state.data.accounts.length} рахунків, ${state.data.transactions.length} транзакцій, ${state.data.categories.length} категорій.`;
      vibrate([10, 40, 30]);
      render();
    } catch (err) {
      state.modal = 'infoBlocked';
      state.modalCtx = 'Не вдалося прочитати файл як JSON. Можливо, файл пошкоджений.';
      render();
    }
  };
  reader.onerror = () => {
    state.modal = 'infoBlocked';
    state.modalCtx = 'Помилка читання файлу.';
    render();
  };
  reader.readAsText(file);
}

function daysSinceLastBackup() {
  const last = state.data.lastBackupAt;
  if (!last) return null;
  const lastDate = new Date(last);
  const now = new Date();
  return Math.floor((now - lastDate) / (1000 * 60 * 60 * 24));
}

function exportCsv() {
  // Build three CSV files. Use ; separator for Google Sheets/Excel friendliness with EU locale.
  const sep = ',';
  const today = todayISO();

  // Helper: escape value for CSV
  const cell = (v) => {
    if (v == null) return '';
    const s = String(v);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  };

  // Transactions
  const txHeader = ['date', 'type', 'amount', 'currency', 'account', 'category', 'event', 'to_account', 'to_amount', 'to_currency', 'note'];
  const txRows = state.data.transactions
    .slice()
    .sort((a, b) => a.date.localeCompare(b.date))
    .map(t => {
      const acc = findAccount(t.accountId);
      const cat = findCategory(t.categoryId);
      const toAcc = findAccount(t.toAccountId);
      const ev = findEvent(t.eventId);
      return [
        t.date,
        t.type,
        t.amount,
        t.currency,
        acc ? acc.name : '',
        cat ? cat.name : '',
        ev ? ev.name : '',
        toAcc ? toAcc.name : '',
        t.toAmount != null ? t.toAmount : '',
        t.toCurrency || '',
        t.note || ''
      ].map(cell).join(sep);
    });
  const txCsv = [txHeader.join(sep), ...txRows].join('\n');

  // Accounts (with current balance)
  const accHeader = ['name', 'currency', 'balance', 'archived', 'goal_amount', 'goal_description'];
  const accRows = state.data.accounts.map(a => [
    a.name,
    a.currency,
    getAccountBalance(a.id),
    a.archived ? 'yes' : '',
    a.goal ? a.goal.amount : '',
    a.goal ? a.goal.description : ''
  ].map(cell).join(sep));
  const accCsv = [accHeader.join(sep), ...accRows].join('\n');

  // Categories
  const catHeader = ['name', 'type', 'archived'];
  const catRows = state.data.categories.map(c => [
    c.name,
    c.type,
    c.archived ? 'yes' : ''
  ].map(cell).join(sep));
  const catCsv = [catHeader.join(sep), ...catRows].join('\n');

  // Download each (or single combined zip would require JSZip — we'd rather keep it dependency-free)
  downloadFile(`finance-transactions-${today}.csv`, txCsv);
  downloadFile(`finance-accounts-${today}.csv`, accCsv);
  downloadFile(`finance-categories-${today}.csv`, catCsv);
}

function downloadFile(filename, content) {
  // Prepend BOM so Excel/Google Sheets detect UTF-8 with Ukrainian characters
  const blob = new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

/* ============================================================
   ATTACHMENTS — IndexedDB storage layer
   ============================================================
   Files live in their own IndexedDB database, separate from the
   main localStorage state. This keeps binary data out of the JSON
   blob and gives us hundreds of MB of room instead of ~5 MB.
   ============================================================ */
const attDB = (() => {
  const DB_NAME = 'fin-attachments';
  const DB_VERSION = 1;
  const STORE = 'attachments';
  let _db = null;
  let _openPromise = null;

  function open() {
    if (_db) return Promise.resolve(_db);
    if (_openPromise) return _openPromise;
    _openPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE)) {
          const store = db.createObjectStore(STORE, { keyPath: 'id' });
          // Index lets us find all files for a given transaction quickly.
          store.createIndex('by_transaction', 'transactionId');
        }
      };
      req.onsuccess = () => { _db = req.result; resolve(_db); };
      req.onerror = () => reject(req.error);
    });
    return _openPromise;
  }

  async function add(file, transactionId) {
    // Compress images before storage; other file types are stored as-is.
    const processed = await compressIfImage(file);
    const record = {
      id: 'att_' + uid(),
      transactionId: transactionId || null,
      name: file.name || 'unnamed',
      mime: processed.type || file.type || 'application/octet-stream',
      size: processed.size,
      blob: processed,
      addedAt: Date.now()
    };
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).add(record);
      tx.oncomplete = () => resolve(record);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getByTransaction(transactionId) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const idx = tx.objectStore(STORE).index('by_transaction');
      const req = idx.getAll(transactionId);
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  async function get(id) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function remove(id) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getAll() {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  async function clear() {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).clear();
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  return { open, add, get, getByTransaction, getAll, remove, clear };
})();

/* ============================================================
   IMAGE COMPRESSION
   ============================================================
   Resize down to maxDim on the longer side and re-encode as JPEG.
   For docs/receipts at 1600px / 0.8 quality a typical 3-4 MB photo
   shrinks to 200-500 KB while staying easily readable.
   ============================================================ */
async function compressIfImage(file, maxDim = 1600, quality = 0.8) {
  if (!file || !file.type) return file;
  if (!file.type.startsWith('image/')) return file;
  // Animated GIFs would lose animation through canvas — keep them as-is.
  if (file.type === 'image/gif') return file;
  // Already small enough that compression would make things worse.
  if (file.size < 200 * 1024) return file;

  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob((blob) => {
        URL.revokeObjectURL(url);
        // If compression somehow made it bigger, keep the original.
        if (blob && blob.size < file.size) {
          // Preserve the original name by attaching it as a property.
          // (We store name separately in the DB record anyway.)
          resolve(blob);
        } else {
          resolve(file);
        }
      }, 'image/jpeg', quality);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      resolve(file);
    };
    img.src = url;
  });
}

/* ============================================================
   STORAGE — persistence & quota
   ============================================================
   navigator.storage.persist() asks the browser not to evict our
   data under disk pressure. Standalone PWAs usually get this
   automatically; Chrome in a tab may refuse.
   ============================================================ */
async function requestPersistence() {
  if (!navigator.storage || !navigator.storage.persist) {
    return { supported: false, persistent: false };
  }
  try {
    const already = await navigator.storage.persisted();
    if (already) return { supported: true, persistent: true };
    const granted = await navigator.storage.persist();
    return { supported: true, persistent: !!granted };
  } catch (e) {
    return { supported: true, persistent: false, error: String(e) };
  }
}

async function storageEstimate() {
  if (!navigator.storage || !navigator.storage.estimate) return null;
  try {
    return await navigator.storage.estimate();
  } catch (e) {
    return null;
  }
}

function fmtBytes(n) {
  if (n == null) return '—';
  if (n < 1024) return n + ' Б';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' КБ';
  if (n < 1024 * 1024 * 1024) return (n / (1024 * 1024)).toFixed(1) + ' МБ';
  return (n / (1024 * 1024 * 1024)).toFixed(2) + ' ГБ';
}

function setupSwipe() {
  const TAB_ORDER = ['transactions', 'accounts', 'stats', 'settings'];
  // Minimum horizontal distance (px) to count as a swipe
  const MIN_DISTANCE = 60;
  // Maximum vertical drift (px) — bigger means it's a scroll, not a swipe
  const MAX_VERTICAL = 60;
  // Edge-swipe-back: must start within this many px from left edge
  const EDGE_WIDTH = 30;
  // Mirror dead zone on the right edge — Android back-gesture lives there,
  // so we ignore swipes that start in this strip and let the system handle them.
  const RIGHT_EDGE_DEAD_ZONE = 30;

  let startX = 0, startY = 0, startT = 0, startedAtEdge = false, startedNearRightEdge = false, tracking = false;

  document.addEventListener('touchstart', (e) => {
    // Don't intercept if a modal is open — modals have their own scroll context
    if (state.modal) { tracking = false; return; }
    // Don't intercept inside scrollable horizontal elements (none currently, but safe)
    if (e.target.closest('select, input, textarea, button')) { tracking = false; return; }
    const t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
    startT = Date.now();
    startedAtEdge = startX < EDGE_WIDTH;
    startedNearRightEdge = startX > window.innerWidth - RIGHT_EDGE_DEAD_ZONE;
    tracking = true;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!tracking) return;
    tracking = false;
    if (state.modal) return;

    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startT;

    // Must be primarily horizontal
    if (Math.abs(dx) < MIN_DISTANCE) return;
    if (Math.abs(dy) > MAX_VERTICAL) return;
    // Too slow — treat as drag, not swipe
    if (dt > 600) return;

    // Edge-swipe-from-left = back gesture (works in account detail)
    if (dx > 0 && startedAtEdge && state.subView) {
      state.subView = null;
      vibrate(8);
      render();
      return;
    }

    // Right-to-left swipe inside a sub-view = back.
    // Must NOT start in the right-edge dead zone (that belongs to Android's
    // system back gesture). Anywhere else on the screen is fair game.
    if (dx < 0 && state.subView && !startedNearRightEdge) {
      state.subView = null;
      vibrate(8);
      render();
      return;
    }

    // Tab swipe: only when at top level (no subView, no modal)
    if (state.subView) return;
    const idx = TAB_ORDER.indexOf(state.view);
    if (idx < 0) return;

    if (dx < 0 && idx < TAB_ORDER.length - 1) {
      // Swipe left → next tab
      state.view = TAB_ORDER[idx + 1];
      vibrate(8);
      render();
    } else if (dx > 0 && idx > 0) {
      // Swipe right → previous tab
      state.view = TAB_ORDER[idx - 1];
      vibrate(8);
      render();
    }
  }, { passive: true });
}

function setupManifest() {
  // Generate the PWA manifest at runtime via Blob.
  // Inline data: URI manifests are fragile across browsers — Blob URL is reliable.
  const iconSvg = encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">' +
    '<rect width="512" height="512" rx="115" fill="#0a0a0a"/>' +
    '<text x="256" y="348" font-family="Georgia,serif" font-size="300" font-weight="600" text-anchor="middle" fill="#d4a574">₴</text>' +
    '</svg>'
  );
  const iconUrl = 'data:image/svg+xml,' + iconSvg;
  const manifest = {
    name: 'Фінанси',
    short_name: 'Фінанси',
    start_url: '.',
    display: 'standalone',
    background_color: '#0a0a0a',
    theme_color: '#0a0a0a',
    orientation: 'portrait',
    icons: [
      { src: iconUrl, sizes: '192x192', type: 'image/svg+xml', purpose: 'any' },
      { src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any' },
      { src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'maskable' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.head.appendChild(link);
}

function setupServiceWorker() {
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => {
        console.warn('SW register failed:', err);
      });
    });
  }
}

function applyTheme() {
  const setting = state.data.theme || 'system';
  let effective = setting;
  if (setting === 'system') {
    effective = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', effective);
  // Update theme-color meta to match
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) {
    meta.setAttribute('content', effective === 'light' ? '#f5f1ea' : '#0a0a0a');
  }
}

/* ============================================================
   STATE & STORAGE
   ============================================================ */

function defaultData() {
  return {
    version: 1,
    baseCurrency: 'EUR',
    viewCurrency: 'EUR',
    theme: 'system',
    accounts: [],
    categories: [],
    fxRates: { EUR: 1, UAH: 0.022, USD: 0.92, GBP: 1.17 },
    transactions: [],
    events: [],
    budgets: [],
    recurringRules: []
  };
}

function migrate(d) {
  // Ensure all fields exist (forward-safe loading)
  if (!d.version) d.version = 1;
  if (!d.baseCurrency) d.baseCurrency = 'EUR';
  if (!d.viewCurrency) d.viewCurrency = 'EUR';
  if (!d.theme) d.theme = 'system';
  if (!d.accounts) d.accounts = [];
  if (!d.categories) d.categories = [];
  if (!d.fxRates) d.fxRates = { EUR: 1, UAH: 0.022, USD: 0.92, GBP: 1.17 };
  if (!d.transactions) d.transactions = [];
  if (!d.events) d.events = [];
  if (!d.budgets) d.budgets = [];
  if (!d.recurringRules) d.recurringRules = [];
  if (d.lastBackupAt === undefined) d.lastBackupAt = null;
  if (d.backupReminderHiddenUntil === undefined) d.backupReminderHiddenUntil = null;
  // Backfill on legacy accounts/transactions
  for (const a of d.accounts) {
    if (!a.currency) a.currency = 'EUR';
    if (a.goal === undefined) a.goal = null;
  }
  for (const t of d.transactions) {
    if (!t.currency) t.currency = 'EUR';
    if (t.scheduledFor === undefined) t.scheduledFor = null;
    if (t.recurringRuleId === undefined) t.recurringRuleId = null;
  }
  // Always ensure EUR rate = 1
  d.fxRates.EUR = 1;
  return d;
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultData();
    return migrate(JSON.parse(raw));
  } catch (e) {
    console.warn('Load failed, using defaults', e);
    return defaultData();
  }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
  } catch (e) {
    console.error('Save failed', e);
  }
}

const state = {
  data: loadData(),
  view: 'transactions',    // transactions | accounts | stats | settings
  subView: null,           // null | { type: 'accountDetail', id: '...' }
  settingsTab: 'categories',
  modal: null,             // null | newTx | newAcc | newCat | txDetail | confirmDelTx | confirmDelAcc | confirmDelCat | infoBlocked
  modalCtx: null,          // arbitrary data for modal
  modalForm: {},           // current values in the open modal
  pendingTx: null,         // when creating category from tx-form, holds the tx form to return to
  // Stage 1 — attachments smoke-test (will be removed in Stage 2):
  testFiles: [],           // cached list of attachments shown in Test settings tab
  testQuota: null,         // last storage estimate { usage, quota }
  testPersistent: null,    // null until requested; then true/false
  testBusy: false          // true while files are being added
};

/* ============================================================
   HELPERS
   ============================================================ */

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function monthKey(dateStr) {
  return dateStr.slice(0, 7);
}

function fmtMoney(n, signed = false, currency = 'EUR') {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n).toLocaleString('en-IE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const sign = signed
    ? (n < 0 ? '−' : n > 0 ? '+' : '')
    : (n < 0 ? '−' : '');
  const sym = CURRENCY_SYMBOLS[currency] || (currency + ' ');
  return sign + sym + abs;
}

function fmtDateLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff === 0) return 'Сьогодні';
  if (diff === -1) return 'Вчора';
  return d.getDate() + ' ' + MONTHS_SHORT[d.getMonth()] + (d.getFullYear() !== today.getFullYear() ? ' ' + d.getFullYear() : '');
}

function fmtMonthLabel(monthStr) {
  const [y, m] = monthStr.split('-');
  return MONTHS_FULL[parseInt(m, 10) - 1] + ' ' + y;
}

function vibrate(ms) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

function nextAutoColor() {
  const used = state.data.accounts.length + state.data.categories.length;
  return COLOR_PALETTE[used % COLOR_PALETTE.length];
}

function isScheduled(t) {
  return t && t.scheduledFor != null;
}

function isoToDate(iso) {
  // YYYY-MM-DD → Date at local midnight
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function dateToIso(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function daysInMonth(year, month) {
  // month is 0-indexed
  return new Date(year, month + 1, 0).getDate();
}

/**
 * Compute the next occurrence date for a recurring rule, strictly AFTER `fromIso`.
 * Returns ISO string YYYY-MM-DD or null if past end date.
 */
function computeNextDate(rule, fromIso) {
  const from = isoToDate(fromIso);
  let next;

  if (rule.frequency === 'weekly') {
    next = new Date(from);
    next.setDate(next.getDate() + 1);
    while (next.getDay() !== rule.dayOfWeek) {
      next.setDate(next.getDate() + 1);
    }
  } else if (rule.frequency === 'monthly') {
    next = new Date(from);
    next.setDate(1);
    next.setMonth(next.getMonth() + 1);
    // Clamp day to last day of month if needed
    const target = Math.min(rule.dayOfMonth, daysInMonth(next.getFullYear(), next.getMonth()));
    next.setDate(target);
    // If somehow that's still <= from (edge case), bump another month
    if (next <= from) {
      next.setMonth(next.getMonth() + 1);
      next.setDate(Math.min(rule.dayOfMonth, daysInMonth(next.getFullYear(), next.getMonth())));
    }
  } else if (rule.frequency === 'yearly') {
    next = new Date(from.getFullYear(), rule.monthOfYear - 1, 1);
    const target = Math.min(rule.dayOfMonth, daysInMonth(next.getFullYear(), next.getMonth()));
    next.setDate(target);
    if (next <= from) {
      next = new Date(from.getFullYear() + 1, rule.monthOfYear - 1, 1);
      next.setDate(Math.min(rule.dayOfMonth, daysInMonth(next.getFullYear(), next.getMonth())));
    }
  } else {
    return null;
  }

  // Check end date
  if (rule.endDate && dateToIso(next) > rule.endDate) return null;

  return dateToIso(next);
}

/**
 * Walk active rules and ensure each has exactly one upcoming scheduled transaction.
 * Called on app start and after rule changes.
 */
function generateScheduledForRules() {
  const today = todayISO();
  let createdAny = false;

  for (const rule of state.data.recurringRules) {
    if (rule.paused) continue;
    if (rule.endDate && rule.endDate < today) continue;

    // Find existing scheduled tx for this rule
    const existing = state.data.transactions.find(t =>
      t.recurringRuleId === rule.id && isScheduled(t)
    );
    if (existing) continue;  // Already has one upcoming; skip

    // Anchor: latest tx (scheduled or confirmed) from this rule, or rule.startDate as fallback
    const allFromRule = state.data.transactions
      .filter(t => t.recurringRuleId === rule.id)
      .sort((a, b) => {
        const da = isScheduled(a) ? a.scheduledFor : a.date;
        const db = isScheduled(b) ? b.scheduledFor : b.date;
        return db.localeCompare(da);
      });
    const lastDate = allFromRule.length > 0
      ? (isScheduled(allFromRule[0]) ? allFromRule[0].scheduledFor : allFromRule[0].date)
      : rule.startDate;

    const nextDate = computeNextDate(rule, lastDate);
    if (!nextDate) continue;  // Past end date

    // Create the scheduled tx as a snapshot of the rule
    const now = new Date().toISOString();
    const acc = findAccount(rule.accountId);
    const fromCur = acc ? acc.currency : 'EUR';

    if (rule.type === 'Transfer') {
      state.data.transactions.push({
        id: uid(),
        date: nextDate,
        type: 'Transfer',
        amount: rule.amount,
        currency: fromCur,
        accountId: rule.accountId,
        categoryId: null,
        toAccountId: rule.toAccountId,
        toAmount: rule.toAmount,
        toCurrency: rule.toCurrency,
        eventId: null,
        scheduledFor: nextDate,
        recurringRuleId: rule.id,
        note: rule.note || '',
        createdAt: now,
        updatedAt: now
      });
    } else {
      state.data.transactions.push({
        id: uid(),
        date: nextDate,
        type: rule.type,
        amount: rule.amount,
        currency: fromCur,
        accountId: rule.accountId,
        categoryId: rule.categoryId,
        toAccountId: null,
        toAmount: null,
        toCurrency: null,
        eventId: null,
        scheduledFor: nextDate,
        recurringRuleId: rule.id,
        note: rule.note || '',
        createdAt: now,
        updatedAt: now
      });
    }
    createdAny = true;
  }

  if (createdAny) saveData();
}

function findRule(id) { return state.data.recurringRules.find(r => r.id === id); }

function getAccountBalance(accountId) {
  let bal = 0;
  for (const t of state.data.transactions) {
    // Scheduled transactions don't affect balance until confirmed
    if (isScheduled(t)) continue;
    // Income/Expense/Opening affect the account they're on
    if (t.accountId === accountId) {
      if (t.type === 'Income' || t.type === 'Opening') bal += t.amount;
      else if (t.type === 'Expense') bal -= t.amount;
      else if (t.type === 'Transfer') bal -= t.amount;
    }
    // Transfers also affect the destination account
    if (t.type === 'Transfer' && t.toAccountId === accountId) {
      bal += (t.toAmount != null ? t.toAmount : t.amount);
    }
  }
  return bal;
}

/**
 * Convert amount from one currency to another via stored EUR-anchored rates.
 * rates[X] = how many EUR 1 unit of X equals.
 */
function convertCurrency(amount, fromCur, toCur) {
  if (amount == null || isNaN(amount)) return 0;
  if (fromCur === toCur) return amount;
  const rates = state.data.fxRates || {};
  const fromRate = rates[fromCur];
  const toRate = rates[toCur];
  if (!fromRate || !toRate) return amount;  // graceful fallback
  const inEur = amount * fromRate;
  return inEur / toRate;
}

function findAccount(id) { return state.data.accounts.find(a => a.id === id); }
function findCategory(id) { return state.data.categories.find(c => c.id === id); }

/**
 * Build display info for a transaction row.
 * Returns { label, dotColor, amountHtml, metaHtml }
 */
function describeTransaction(t, ctx = {}) {
  // ctx.hideAccountInMeta — when shown inside an account-detail view, don't repeat the account name
  const acc = findAccount(t.accountId);
  const cat = findCategory(t.categoryId);

  if (t.type === 'Transfer') {
    const toAcc = findAccount(t.toAccountId);
    const fromCur = t.currency || (acc ? acc.currency : 'EUR');
    const toCur = t.toCurrency || (toAcc ? toAcc.currency : fromCur);
    const sameCur = fromCur === toCur;
    let amountHtml;
    if (sameCur) {
      amountHtml = `<span class="amount transfer num">${fmtMoney(t.amount, false, fromCur)}</span>`;
    } else {
      // Show both sides compactly
      amountHtml = `<span class="amount transfer num">${fmtMoney(t.amount, false, fromCur)} → ${fmtMoney(t.toAmount, false, toCur)}</span>`;
    }
    const fromName = acc ? acc.name : '—';
    const toName = toAcc ? toAcc.name : '—';
    return {
      label: 'Переказ',
      dotColor: 'var(--transfer)',
      amountHtml,
      metaHtml: `${escapeHtml(fromName)} → ${escapeHtml(toName)}${t.note ? ' · ' + escapeHtml(t.note) : ''}`
    };
  }

  const isInc = t.type === 'Income';
  const isOpen = t.type === 'Opening';
  const label = isOpen ? 'Початковий залишок' : (cat ? cat.name : '—');
  const dotColor = cat ? cat.color : (acc ? acc.color : 'var(--text-3)');
  const amountClass = (isInc || isOpen) ? 'income' : 'expense';
  const sign = (isInc || isOpen) ? '+' : '−';
  const amountHtml = `<span class="amount ${amountClass} num">${sign}${fmtMoney(Math.abs(t.amount), false, t.currency).replace('−','').replace('+','')}</span>`;
  const accName = acc ? escapeHtml(acc.name) : '—';
  const noteHtml = t.note ? ' · ' + escapeHtml(t.note) : '';
  const metaHtml = ctx.hideAccountInMeta
    ? (t.note ? escapeHtml(t.note) : '')
    : (accName + noteHtml);
  return { label, dotColor, amountHtml, metaHtml };
}

function createAccount({ name, currency, color, openingBalance, goalAmount, goalDescription }) {
  const now = new Date().toISOString();
  let goal = null;
  const ga = parseFloat(goalAmount);
  if (!isNaN(ga) && ga > 0) {
    goal = {
      amount: ga,
      description: (goalDescription || '').trim(),
      deadline: null
    };
  }
  const acc = {
    id: uid(),
    name: name.trim(),
    currency: currency || 'EUR',
    color,
    archived: false,
    goal,
    createdAt: now
  };
  state.data.accounts.push(acc);

  // Add opening balance as a transaction if provided
  const ob = parseFloat(openingBalance);
  if (!isNaN(ob) && ob !== 0) {
    state.data.transactions.push({
      id: uid(),
      date: todayISO(),
      type: 'Opening',
      amount: ob,
      currency: acc.currency,
      accountId: acc.id,
      categoryId: null,
      toAccountId: null,
      toAmount: null,
      toCurrency: null,
      eventId: null,
      note: '',
      createdAt: now,
      updatedAt: now
    });
  }
  saveData();
}

function deleteAccount(id) {
  state.data.accounts = state.data.accounts.filter(a => a.id !== id);
  saveData();
}

function updateAccount(id, { name, color, goalAmount, goalDescription }) {
  const acc = state.data.accounts.find(a => a.id === id);
  if (!acc) return;
  acc.name = name.trim();
  acc.color = color;
  const ga = parseFloat(goalAmount);
  if (!isNaN(ga) && ga > 0) {
    acc.goal = {
      amount: ga,
      description: (goalDescription || '').trim(),
      deadline: acc.goal ? acc.goal.deadline : null
    };
  } else {
    acc.goal = null;
  }
  saveData();
}

function archiveAccount(id) {
  const acc = state.data.accounts.find(a => a.id === id);
  if (acc) { acc.archived = true; saveData(); }
}

function unarchiveAccount(id) {
  const acc = state.data.accounts.find(a => a.id === id);
  if (acc) { acc.archived = false; saveData(); }
}

function accountHasTransactions(id) {
