function createTransaction({ date, type, amount, accountId, categoryId, note, toAccountId, toAmount, eventId, scheduledFor }) {
  const now = new Date().toISOString();
  const acc = findAccount(accountId);
  const fromCur = acc ? acc.currency : 'EUR';

  if (type === 'Transfer') {
    const toAcc = findAccount(toAccountId);
    const toCur = toAcc ? toAcc.currency : fromCur;
    const amt = parseFloat(amount);
    // Same currency: toAmount equals amount. Cross-currency: from form.
    let toAmt = (fromCur === toCur)
      ? amt
      : (toAmount != null && toAmount !== '' ? parseFloat(toAmount) : convertCurrency(amt, fromCur, toCur));
    state.data.transactions.push({
      id: uid(),
      date,
      type: 'Transfer',
      amount: amt,
      currency: fromCur,
      accountId,
      categoryId: null,
      toAccountId,
      toAmount: toAmt,
      toCurrency: toCur,
      eventId: eventId || null,
      scheduledFor: scheduledFor || null,
      note: (note || '').trim(),
      createdAt: now,
      updatedAt: now
    });
  } else {
    state.data.transactions.push({
      id: uid(),
      date,
      type,
      amount: parseFloat(amount),
      currency: fromCur,
      accountId,
      categoryId,
      toAccountId: null,
      toAmount: null,
      toCurrency: null,
      eventId: eventId || null,
      scheduledFor: scheduledFor || null,
      note: (note || '').trim(),
      createdAt: now,
      updatedAt: now
    });
  }
  saveData();
}

function updateTransaction(id, { date, type, amount, accountId, categoryId, note, toAccountId, toAmount, eventId, scheduledFor }) {
  const tx = state.data.transactions.find(t => t.id === id);
  if (!tx) return;
  const now = new Date().toISOString();
  const acc = findAccount(accountId);
  const fromCur = acc ? acc.currency : 'EUR';

  if (type === 'Transfer') {
    const toAcc = findAccount(toAccountId);
    const toCur = toAcc ? toAcc.currency : fromCur;
    const amt = parseFloat(amount);
    let toAmt = (fromCur === toCur)
      ? amt
      : (toAmount != null && toAmount !== '' ? parseFloat(toAmount) : convertCurrency(amt, fromCur, toCur));
    tx.date = date;
    tx.type = 'Transfer';
    tx.amount = amt;
    tx.currency = fromCur;
    tx.accountId = accountId;
    tx.categoryId = null;
    tx.toAccountId = toAccountId;
    tx.toAmount = toAmt;
    tx.toCurrency = toCur;
    tx.eventId = eventId || null;
    tx.scheduledFor = scheduledFor || null;
    tx.note = (note || '').trim();
    tx.updatedAt = now;
  } else {
    tx.date = date;
    tx.type = type;
    tx.amount = parseFloat(amount);
    tx.currency = fromCur;
    tx.accountId = accountId;
    tx.categoryId = categoryId;
    tx.toAccountId = null;
    tx.toAmount = null;
    tx.toCurrency = null;
    tx.eventId = eventId || null;
    tx.scheduledFor = scheduledFor || null;
    tx.note = (note || '').trim();
    tx.updatedAt = now;
  }
  saveData();
}

function deleteTransaction(id) {
  state.data.transactions = state.data.transactions.filter(t => t.id !== id);
  saveData();
}

function confirmScheduledTransaction(id) {
  const tx = state.data.transactions.find(t => t.id === id);
  if (!tx || !isScheduled(tx)) return;
  // Use the scheduled date as the actual date; mark as confirmed by clearing scheduledFor
  tx.date = tx.scheduledFor;
  tx.scheduledFor = null;
  tx.updatedAt = new Date().toISOString();
  saveData();
  // After confirming a recurring one, generate the next occurrence
  if (tx.recurringRuleId) generateScheduledForRules();
}

function createRuleFromTransaction(txId, { frequency, endDate }) {
  const tx = state.data.transactions.find(t => t.id === txId);
  if (!tx) return null;

  const refDate = isoToDate(tx.date);
  const now = new Date().toISOString();
  const rule = {
    id: uid(),
    type: tx.type,
    amount: tx.amount,
    accountId: tx.accountId,
    categoryId: tx.categoryId,
    toAccountId: tx.toAccountId || null,
    toAmount: tx.toAmount != null ? tx.toAmount : null,
    toCurrency: tx.toCurrency || null,
    note: tx.note || '',
    frequency,
    dayOfWeek: refDate.getDay(),
    dayOfMonth: refDate.getDate(),
    monthOfYear: refDate.getMonth() + 1,
    startDate: tx.date,
    endDate: endDate || null,
    paused: false,
    createdAt: now,
    updatedAt: now
  };
  state.data.recurringRules.push(rule);
  // Link the source transaction to the rule so we don't generate a duplicate for the same date
  tx.recurringRuleId = rule.id;
  saveData();
  generateScheduledForRules();
  return rule;
}

function updateRule(id, patch) {
  const rule = state.data.recurringRules.find(r => r.id === id);
  if (!rule) return;
  Object.assign(rule, patch);
  rule.updatedAt = new Date().toISOString();
  saveData();
  // Re-evaluate — if amount or schedule changed, the existing upcoming may need updating.
  // Simple approach: delete any unconfirmed scheduled tx tied to this rule, regenerate.
  state.data.transactions = state.data.transactions.filter(t =>
    !(t.recurringRuleId === id && isScheduled(t))
  );
  saveData();
  generateScheduledForRules();
}

function deleteRule(id) {
  state.data.recurringRules = state.data.recurringRules.filter(r => r.id !== id);
  // Also remove pending scheduled tx from this rule
  state.data.transactions = state.data.transactions.filter(t =>
    !(t.recurringRuleId === id && isScheduled(t))
  );
  // Confirmed transactions keep their recurringRuleId as a historical marker — harmless
  saveData();
}

function toggleRulePause(id) {
  const rule = state.data.recurringRules.find(r => r.id === id);
  if (!rule) return;
  rule.paused = !rule.paused;
  rule.updatedAt = new Date().toISOString();
  // If pausing, remove the pending scheduled tx (so it doesn't sit there)
  if (rule.paused) {
    state.data.transactions = state.data.transactions.filter(t =>
      !(t.recurringRuleId === id && isScheduled(t))
    );
  }
  saveData();
  if (!rule.paused) generateScheduledForRules();
}

/* ============================================================
   RENDERERS — VIEWS
   ============================================================ */

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderHeader()}
    <main>${renderView()}</main>
    ${renderFab()}
    ${renderNav()}
    ${state.modal ? renderModal() : ''}
  `;
}

function renderHeader() {
  const cm = todayISO().slice(0, 7);
  const monthTx = state.data.transactions.filter(t => monthKey(t.date) === cm);
  // Aggregate income/expense per currency
  const byCur = {};
  for (const t of monthTx) {
    if (t.type !== 'Income' && t.type !== 'Expense') continue;
    const cur = t.currency || 'EUR';
    if (!byCur[cur]) byCur[cur] = { inc: 0, exp: 0 };
    if (t.type === 'Income') byCur[cur].inc += t.amount;
    else byCur[cur].exp += t.amount;
  }
  // Display the primary (most active) currency, with hint if others exist
  const currencies = Object.keys(byCur);
  let primary = state.data.baseCurrency || 'EUR';
  if (currencies.length > 0 && !byCur[primary]) primary = currencies[0];
  const data = byCur[primary] || { inc: 0, exp: 0 };
  const net = data.inc - data.exp;
  const others = currencies.filter(c => c !== primary);

  return `
    <header class="app-head">
      <div class="top">
        <h1>Фінанси</h1>
        <span class="month">${fmtMonthLabel(cm)}</span>
      </div>
      <div class="summary">
        <div class="cell">
          <div class="lbl">Доход</div>
          <div class="val" style="color: var(--income)">${fmtMoney(data.inc, false, primary)}</div>
        </div>
        <div class="cell">
          <div class="lbl">Витрати</div>
          <div class="val" style="color: var(--expense)">${fmtMoney(data.exp, false, primary)}</div>
        </div>
        <div class="cell">
          <div class="lbl">Net</div>
          <div class="val" style="color: ${net >= 0 ? 'var(--income)' : 'var(--expense)'}">${fmtMoney(net, true, primary)}</div>
        </div>
      </div>
      ${others.length > 0 ? `<div class="head-hint">+ є транзакції в ${others.join(', ')}</div>` : ''}
    </header>
  `;
}

function renderView() {
  // Sub-views take priority
  if (state.subView) {
    if (state.subView.type === 'accountDetail') return renderAccountDetail();
  }
  switch (state.view) {
    case 'transactions': return renderTransactions();
    case 'accounts':     return renderAccounts();
    case 'stats':        return renderStats();
    case 'settings':     return renderSettings();
  }
  return '';
}

function renderBackupReminder() {
  // Don't show if there's no data worth backing up
  if (state.data.transactions.length === 0 && state.data.accounts.length === 0) return '';

  // Don't show if hidden until tomorrow
  const hiddenUntil = state.data.backupReminderHiddenUntil;
  if (hiddenUntil && new Date(hiddenUntil) > new Date()) return '';

  const days = daysSinceLastBackup();
  let message;
  if (days === null) {
    message = 'Ти ще не робив бекап. Зроби зараз — це 5 секунд.';
  } else if (days >= 7) {
    message = `Минув ${days === 7 ? 'тиждень' : days + ' днів'} від останнього бекапу.`;
  } else {
    return '';  // Less than 7 days — no reminder
  }

  return `
    <div class="backup-reminder">
      <div class="backup-reminder-msg">${message}</div>
      <div class="backup-reminder-actions">
        <button data-action="dismiss-backup-reminder" class="dismiss">Пізніше</button>
        <button data-action="export-backup" class="now">Зберегти →</button>
      </div>
    </div>
  `;
}

function renderTransactions() {
  const today = todayISO();
  const all = state.data.transactions;

  // Split into three groups
  const due = all.filter(t => isScheduled(t) && t.scheduledFor <= today);
  const upcoming = all.filter(t => isScheduled(t) && t.scheduledFor > today);
  const regular = all.filter(t => !isScheduled(t));

  // Sort
  due.sort((a, b) => a.scheduledFor.localeCompare(b.scheduledFor));  // oldest first (most overdue at top)
  upcoming.sort((a, b) => a.scheduledFor.localeCompare(b.scheduledFor));  // soonest first
  regular.sort((a, b) => {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return b.createdAt.localeCompare(a.createdAt);
  });

  if (all.length === 0) {
    return `
      <div class="empty">
        <div class="title">Порожньо</div>
        <div class="hint">${state.data.accounts.length === 0
          ? 'Спочатку додай рахунок у вкладці «Рахунки»'
          : 'Тапни «+» щоб додати транзакцію'}</div>
      </div>`;
  }

  let html = '';

  // 1. DUE — needs confirmation
  if (due.length > 0) {
    html += `<section class="due-section">
      <div class="section-head section-head-accent">До підтвердження · ${due.length}</div>
    `;
    for (const t of due) {
      html += renderDueTransactionRow(t, today);
    }
    html += `</section>`;
  }

  // 2. REGULAR — main list grouped by date
  if (regular.length > 0) {
    const groups = {};
    for (const t of regular) {
      if (!groups[t.date]) groups[t.date] = [];
      groups[t.date].push(t);
    }
    for (const [date, list] of Object.entries(groups)) {
      html += `<div class="date-head">${fmtDateLabel(date)}</div>`;
      for (const t of list) {
        const info = describeTransaction(t);
        html += `
          <div class="tx-row" data-action="open-tx-detail" data-id="${t.id}">
            <span class="dot" style="background:${info.dotColor}"></span>
            <div class="body">
              <div class="top">
                <span class="name">${escapeHtml(info.label)}</span>
                ${info.amountHtml}
              </div>
              ${info.metaHtml ? `<div class="meta">${info.metaHtml}</div>` : ''}
            </div>
          </div>
        `;
      }
    }
  }

  // 3. UPCOMING — future scheduled
  if (upcoming.length > 0) {
    html += `<section class="upcoming-section">
      <div class="section-head">Заплановані · ${upcoming.length}</div>
    `;
    for (const t of upcoming) {
      html += renderUpcomingTransactionRow(t);
    }
    html += `</section>`;
  }

  return html;
}

function renderDueTransactionRow(t, today) {
  const info = describeTransaction(t);
  const isOverdue = t.scheduledFor < today;
  const dateLabel = t.scheduledFor === today ? 'Сьогодні'
    : isOverdue ? `Прострочено · ${fmtDateLabel(t.scheduledFor)}`
    : fmtDateLabel(t.scheduledFor);

  return `
    <div class="due-row">
      <div class="due-row-info" data-action="open-tx-detail" data-id="${t.id}">
        <span class="dot" style="background:${info.dotColor}"></span>
        <div class="body">
          <div class="top">
            <span class="name">${escapeHtml(info.label)}</span>
            ${info.amountHtml}
          </div>
          <div class="meta ${isOverdue ? 'overdue' : ''}">${dateLabel}${info.metaHtml ? ' · ' + info.metaHtml : ''}</div>
        </div>
      </div>
      <button class="confirm-btn" data-action="confirm-scheduled" data-id="${t.id}">${ICONS.check} Підтвердити</button>
    </div>
  `;
}

function renderUpcomingTransactionRow(t) {
  const info = describeTransaction(t);
  return `
    <div class="upcoming-row" data-action="open-tx-detail" data-id="${t.id}">
      <span class="dot" style="background:${info.dotColor}; opacity: 0.5"></span>
      <div class="body">
        <div class="top">
          <span class="name muted">${escapeHtml(info.label)}</span>
          <span class="upcoming-amount num">${info.amountHtml.replace(/class="amount [^"]+/, 'class="amount upcoming')}</span>
        </div>
        <div class="meta">${fmtDateLabel(t.scheduledFor)}${info.metaHtml ? ' · ' + info.metaHtml : ''}</div>
      </div>
    </div>
  `;
}

function renderAccounts() {
  if (state.data.accounts.length === 0) {
    return `
      <div class="empty">
        <div class="title">Жодного рахунку</div>
        <div class="hint">Тапни «+» щоб створити перший</div>
      </div>`;
  }

  const accounts = state.data.accounts.filter(a => !a.archived);
  const withGoal = accounts.filter(a => a.goal);
  const regular  = accounts.filter(a => !a.goal);

  // Convert all balances to viewCurrency and sum
  const view = state.data.viewCurrency || 'EUR';
  let totalInView = 0;
  for (const a of regular) {
    totalInView += convertCurrency(getAccountBalance(a.id), a.currency, view);
  }

  // Per-currency totals (regular accounts only, no conversion)
  const byCur = {};
  for (const a of regular) {
    if (!byCur[a.currency]) byCur[a.currency] = 0;
    byCur[a.currency] += getAccountBalance(a.id);
  }
  const curList = Object.keys(byCur);

  let html = `
    <div class="view-cur-picker">
      ${ALL_CURRENCIES.map(c => `
        <button class="${view === c ? 'active' : ''}" data-action="set-view-cur" data-key="${c}">${CURRENCY_SYMBOLS[c]}</button>
      `).join('')}
    </div>
    <div class="totals-hero">
      <div class="lbl">Загальний баланс</div>
      <div class="val num" style="color:${totalInView < 0 ? 'var(--expense)' : 'var(--accent)'}">${fmtMoney(totalInView, false, view)}</div>
    </div>
    ${curList.length > 1 ? `
      <div class="totals-by-cur">
        <div class="totals-by-cur-head">По валютах</div>
        ${curList.map(cur => `
          <div class="totals-by-cur-row">
            <span class="cur-code">${cur}</span>
            <span class="cur-val num" style="color:${byCur[cur] < 0 ? 'var(--expense)' : 'var(--text)'}">${fmtMoney(byCur[cur], false, cur)}</span>
          </div>
        `).join('')}
      </div>
    ` : ''}
  `;

  if (regular.length > 0) {
    html += `<section>
      <div class="section-head">Активні · ${regular.length}</div>
    `;
    for (const a of regular) {
      const bal = getAccountBalance(a.id);
      html += `
        <div class="acc-card" data-action="open-acc-detail" data-id="${a.id}">
          <span class="swatch" style="background:${a.color}"></span>
          <div class="info">
            <div class="name">${escapeHtml(a.name)}</div>
            <div class="cur">${a.currency}</div>
          </div>
          <div class="balance num" style="color:${bal < 0 ? 'var(--expense)' : 'var(--text)'}">${fmtMoney(bal, false, a.currency)}</div>
        </div>
      `;
    }
    html += '</section>';
  }

  if (withGoal.length > 0) {
    html += `<section>
      <div class="section-head">Цілі · ${withGoal.length}</div>
    `;
    for (const a of withGoal) {
      const bal = getAccountBalance(a.id);
      const pct = a.goal.amount > 0 ? Math.min(100, (bal / a.goal.amount) * 100) : 0;
      const pctDisplay = a.goal.amount > 0 ? Math.round((bal / a.goal.amount) * 100) : 0;
      html += `
        <div class="goal-card" data-action="open-acc-detail" data-id="${a.id}">
          <div class="goal-top">
            <span class="swatch" style="background:${a.color}"></span>
            <div class="goal-name">${escapeHtml(a.name)}</div>
            <div class="goal-pct num">${pctDisplay}%</div>
          </div>
          <div class="goal-bar">
            <div class="goal-bar-fill" style="width:${pct}%; background:${a.color}"></div>
          </div>
          <div class="goal-nums">
            <span class="num">${fmtMoney(bal, false, a.currency)}</span>
            <span class="muted num">/ ${fmtMoney(a.goal.amount, false, a.currency)}</span>
          </div>
          ${a.goal.description ? `<div class="goal-desc">${escapeHtml(a.goal.description)}</div>` : ''}
        </div>
      `;
    }
    html += '</section>';
  }

  // Archived accounts section
  const archived = state.data.accounts.filter(a => a.archived);
  if (archived.length > 0) {
    html += `
      <section>
        <div class="section-head">Архівні · ${archived.length}</div>
    `;
    for (const a of archived) {
      const bal = getAccountBalance(a.id);
      html += `
        <div class="acc-card archived-row" data-action="open-acc-detail" data-id="${a.id}">
          <span class="swatch" style="background:${a.color}; opacity: 0.5"></span>
          <div class="info">
            <div class="name" style="opacity: 0.6">${escapeHtml(a.name)}</div>
            <div class="cur">${a.currency}</div>
          </div>
          <div class="balance num" style="opacity: 0.6">${fmtMoney(bal, false, a.currency)}</div>
        </div>
      `;
    }
    html += `</section>`;
  }

  return html;
}

function renderAccountDetail() {
  const acc = findAccount(state.subView.id);
  if (!acc) {
    state.subView = null;
    return renderAccounts();
  }

  const today = todayISO();
  const allForAcc = state.data.transactions
    .filter(t => t.accountId === acc.id || (t.type === 'Transfer' && t.toAccountId === acc.id));

  const accDue = allForAcc.filter(t => isScheduled(t) && t.scheduledFor <= today)
    .sort((a, b) => a.scheduledFor.localeCompare(b.scheduledFor));
  const accUpcoming = allForAcc.filter(t => isScheduled(t) && t.scheduledFor > today)
    .sort((a, b) => a.scheduledFor.localeCompare(b.scheduledFor));
  const accRegular = allForAcc.filter(t => !isScheduled(t))
    .sort((a, b) => {
      if (a.date !== b.date) return b.date.localeCompare(a.date);
      return b.createdAt.localeCompare(a.createdAt);
    });

  const bal = getAccountBalance(acc.id);

  // Current month income/expense totals for this account (in account's own currency).
  // Ignores scheduled transactions (they have scheduledFor set).
  const cm = todayISO().slice(0, 7);
  let monthInc = 0, monthExp = 0;
  for (const t of state.data.transactions) {
    if (isScheduled(t)) continue;
    if (monthKey(t.date) !== cm) continue;
    // Money coming INTO this account
    if (t.accountId === acc.id && (t.type === 'Income' || t.type === 'Opening')) {
      monthInc += t.amount;
    }
    if (t.type === 'Transfer' && t.toAccountId === acc.id) {
      monthInc += (t.toAmount != null ? t.toAmount : t.amount);
    }
    // Money going OUT of this account
    if (t.accountId === acc.id && t.type === 'Expense') {
      monthExp += t.amount;
    }
    if (t.type === 'Transfer' && t.accountId === acc.id) {
      monthExp += t.amount;
    }
  }

  // All-time income/expense totals for this account (also ignoring scheduled)
  let totalInc = 0, totalExp = 0;
  for (const t of state.data.transactions) {
    if (isScheduled(t)) continue;
    if (t.accountId === acc.id && (t.type === 'Income' || t.type === 'Opening')) {
      totalInc += t.amount;
    }
    if (t.type === 'Transfer' && t.toAccountId === acc.id) {
      totalInc += (t.toAmount != null ? t.toAmount : t.amount);
    }
    if (t.accountId === acc.id && t.type === 'Expense') {
      totalExp += t.amount;
    }
    if (t.type === 'Transfer' && t.accountId === acc.id) {
      totalExp += t.amount;
    }
  }

  // Scheduled (pending) totals — what's coming in/out if everything gets confirmed
  let schedInc = 0, schedExp = 0;
  for (const t of state.data.transactions) {
    if (!isScheduled(t)) continue;
    if (t.accountId === acc.id && t.type === 'Income') {
      schedInc += t.amount;
    }
    if (t.type === 'Transfer' && t.toAccountId === acc.id) {
      schedInc += (t.toAmount != null ? t.toAmount : t.amount);
    }
    if (t.accountId === acc.id && t.type === 'Expense') {
      schedExp += t.amount;
    }
    if (t.type === 'Transfer' && t.accountId === acc.id) {
      schedExp += t.amount;
    }
  }
  const hasScheduled = schedInc > 0 || schedExp > 0;
  // Projected balance = current balance + scheduled income - scheduled expense
  const projected = bal + schedInc - schedExp;

  let html = `
    <div class="detail-head">
      <button class="back" data-action="back-to-accounts">‹ Назад</button>
      <div class="detail-head-actions">
        ${acc.archived
          ? `<button class="icon-btn" data-action="unarchive-acc" data-id="${acc.id}" title="Розархівувати">${ICONS.archive}</button>`
          : `<button class="icon-btn" data-action="edit-acc" data-id="${acc.id}">${ICONS.edit}</button>
             <button class="icon-btn danger-hover" data-action="del-acc-from-detail" data-id="${acc.id}">${ICONS.trash}</button>`
        }
      </div>
    </div>
    <div class="detail-hero">
      <div class="detail-name-row">
        <span class="swatch" style="background:${acc.color}"></span>
        <span class="detail-name serif">${escapeHtml(acc.name)}</span>
      </div>
      <div class="detail-balance num" style="color:${bal < 0 ? 'var(--expense)' : 'var(--text)'}">${fmtMoney(bal, false, acc.currency)}</div>
      <div class="detail-cur">${acc.currency}</div>
    </div>

    <div class="acc-stats">
      <div class="acc-stats-block">
        <div class="acc-stats-head">${fmtMonthLabel(cm)}</div>
        <div class="acc-stats-row">
          <span class="lbl">Надходження</span>
          <span class="val num" style="color: var(--income)">+${fmtMoney(monthInc, false, acc.currency).replace('−','').replace('+','')}</span>
        </div>
        <div class="acc-stats-row">
          <span class="lbl">Витрати</span>
          <span class="val num" style="color: var(--expense)">−${fmtMoney(monthExp, false, acc.currency).replace('−','').replace('+','')}</span>
        </div>
      </div>
      <div class="acc-stats-block">
        <div class="acc-stats-head">За весь час</div>
        <div class="acc-stats-row">
          <span class="lbl">Надходження</span>
          <span class="val num" style="color: var(--income)">+${fmtMoney(totalInc, false, acc.currency).replace('−','').replace('+','')}</span>
        </div>
        <div class="acc-stats-row">
          <span class="lbl">Витрати</span>
          <span class="val num" style="color: var(--expense)">−${fmtMoney(totalExp, false, acc.currency).replace('−','').replace('+','')}</span>
        </div>
      </div>
    </div>

    ${hasScheduled ? `
      <div class="acc-stats acc-stats-scheduled">
        <div class="acc-stats-block">
          <div class="acc-stats-head">Заплановано</div>
          <div class="acc-stats-row">
            <span class="lbl">Надходження</span>
            <span class="val num" style="color: var(--income); opacity: 0.7">+${fmtMoney(schedInc, false, acc.currency).replace('−','').replace('+','')}</span>
          </div>
          <div class="acc-stats-row">
            <span class="lbl">Витрати</span>
            <span class="val num" style="color: var(--expense); opacity: 0.7">−${fmtMoney(schedExp, false, acc.currency).replace('−','').replace('+','')}</span>
          </div>
        </div>
        <div class="acc-stats-block">
          <div class="acc-stats-head">Баланс після</div>
          <div class="projected-balance num" style="color:${projected < 0 ? 'var(--expense)' : 'var(--text)'}">${fmtMoney(projected, false, acc.currency)}</div>
          <div class="projected-note">якщо всі будуть підтверджені</div>
        </div>
      </div>
    ` : ''}
  `;

  // Due / upcoming / regular sections — like the main Transactions tab,
  // but scoped to this account.

  if (accDue.length > 0) {
    html += `<section class="due-section">
      <div class="section-head section-head-accent">До підтвердження · ${accDue.length}</div>
    `;
    for (const t of accDue) {
      html += renderDueTransactionRow(t, today);
    }
    html += `</section>`;
  }

  if (allForAcc.length === 0) {
    html += `<section><div class="section-head">Транзакції · 0</div><div class="empty"><div class="hint">Поки немає транзакцій. Тапни «+»</div></div></section>`;
  } else if (accRegular.length > 0) {
    html += `<section><div class="section-head">Транзакції · ${accRegular.length}</div>`;
    const groups = {};
    for (const t of accRegular) {
      if (!groups[t.date]) groups[t.date] = [];
      groups[t.date].push(t);
    }
    for (const [date, list] of Object.entries(groups)) {
      html += `<div class="date-head">${fmtDateLabel(date)}</div>`;
      for (const t of list) {
        const info = describeTransaction(t, { hideAccountInMeta: true });
        html += `
          <div class="tx-row" data-action="open-tx-detail" data-id="${t.id}">
            <span class="dot" style="background:${info.dotColor}"></span>
            <div class="body">
              <div class="top">
                <span class="name">${escapeHtml(info.label)}</span>
                ${info.amountHtml}
              </div>
              ${info.metaHtml ? `<div class="meta">${info.metaHtml}</div>` : ''}
            </div>
          </div>
        `;
      }
    }
    html += `</section>`;
  }

  if (accUpcoming.length > 0) {
    html += `<section class="upcoming-section">
      <div class="section-head">Заплановані · ${accUpcoming.length}</div>
    `;
    for (const t of accUpcoming) {
      html += renderUpcomingTransactionRow(t);
    }
    html += `</section>`;
  }

  return html;
}

function renderStats() {
  const allTxs = state.data.transactions;

  if (allTxs.length === 0) {
    return `
      <div class="view-title serif">Статистика</div>
      <div class="view-sub">Поки порожньо</div>
      <div class="empty">
        <div class="hint">Статистика з'явиться після першої транзакції</div>
      </div>`;
  }

  const view = state.data.viewCurrency || 'EUR';

  // Helper: convert tx amount into viewCurrency
  const inView = (t) => convertCurrency(t.amount, t.currency || 'EUR', view);

  // Monthly history (last 6 months)
  const months = [];
  const now = new Date();
  for (let i = 0; i < 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    const mtx = allTxs.filter(t => monthKey(t.date) === key);
    const inc = mtx.filter(t => t.type === 'Income').reduce((s, t) => s + inView(t), 0);
    const exp = mtx.filter(t => t.type === 'Expense').reduce((s, t) => s + inView(t), 0);
    months.push({ key, inc, exp, net: inc - exp });
  }

  const maxMonth = Math.max(1, ...months.map(m => Math.max(m.inc, m.exp)));

  // Category breakdown (current month, expenses)
  const cm = todayISO().slice(0, 7);
  const byCat = {};
  for (const t of allTxs) {
    if (t.type !== 'Expense' || monthKey(t.date) !== cm) continue;
    const cat = findCategory(t.categoryId);
    const key = cat ? cat.name : '—';
    if (!byCat[key]) byCat[key] = { total: 0, color: cat ? cat.color : 'var(--text-3)' };
    byCat[key].total += inView(t);
  }
  const catList = Object.entries(byCat).sort((a, b) => b[1].total - a[1].total);
  const catTotal = catList.reduce((s, [, v]) => s + v.total, 0);

  let html = `
    <div class="view-title serif">Статистика</div>
    <div class="view-sub">${fmtMonthLabel(cm)} · усе в ${view}</div>

    <section>
      <div class="section-head">Місячна історія · 6 міс</div>
  `;
  for (const m of months) {
    html += `
      <div class="month-bar-row">
        <div class="top">
          <span class="mlbl">${fmtMonthLabel(m.key)}</span>
          <span class="net" style="color: ${m.net >= 0 ? 'var(--income)' : 'var(--expense)'}">${fmtMoney(m.net, true, view)}</span>
        </div>
        <div class="month-bar">
          <div class="inc"><span style="width:${(m.inc / maxMonth) * 100}%"></span></div>
          <div class="exp"><span style="width:${(m.exp / maxMonth) * 100}%"></span></div>
        </div>
        <div class="nums">
          <span style="color: var(--income)">+${fmtMoney(m.inc, false, view).replace('+','').replace('−','')}</span>
          <span style="color: var(--expense)">−${fmtMoney(m.exp, false, view).replace('+','').replace('−','')}</span>
        </div>
      </div>
    `;
  }
  html += `</section>`;

  if (catList.length > 0) {
    html += `
      <section>
        <div class="section-head">Витрати за категоріями · ${fmtMonthLabel(cm)}</div>
    `;
    for (const [name, v] of catList) {
      const pct = catTotal > 0 ? (v.total / catTotal) * 100 : 0;
      html += `
        <div class="stat-line" style="border-bottom: none; padding-bottom: 4px;">
          <span class="lbl"><span class="swatch" style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${v.color};margin-right:8px;vertical-align:middle"></span>${escapeHtml(name)}</span>
          <span class="val">${fmtMoney(v.total, false, view)}</span>
        </div>
        <div style="height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 10px;">
          <div style="width: ${pct}%; height: 100%; background: ${v.color}; border-radius: 2px;"></div>
        </div>
      `;
    }
    html += `</section>`;
  }

  // Account balances at-a-glance
  const accs = state.data.accounts.filter(a => !a.archived);
  if (accs.length > 0) {
    html += `
      <section>
        <div class="section-head">Баланси рахунків</div>
    `;
    for (const a of accs) {
      const bal = getAccountBalance(a.id);
      html += `
        <div class="stat-line">
          <span class="lbl"><span class="swatch" style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${a.color};margin-right:8px;vertical-align:middle"></span>${escapeHtml(a.name)}</span>
          <span class="val num" style="color:${bal < 0 ? 'var(--expense)' : 'var(--text)'}">${fmtMoney(bal, false, a.currency)}</span>
        </div>
      `;
    }
    html += `</section>`;
  }
  return html;
}

function renderSettings() {
  return `
    <div class="view-title serif">Налаштування</div>
    <div class="view-sub">Категорії, курси, бекап</div>

    <div class="stab-bar stab-bar-5">
      <button class="${state.settingsTab === 'categories' ? 'active' : ''}" data-action="stab" data-key="categories">Категорії</button>

function renderBackupSettings() {
  return `
    <section style="margin-top: 6px;">
      <div class="section-head">Бекап</div>

          if (days === 1) return `<span class="muted">Останній бекап — вчора.</span>`;

      <input type="file" id="backup-file-input" accept="*" style="display:none">
      <div style="font-size: 11px; color: var(--text-3); margin-top: 10px; line-height: 1.5;">
        Бекап — це один JSON-файл з усіма даними. Збережи його в Telegram (Saved Messages) або Google Drive — і дані переживуть будь-яке очищення Chrome чи зміну телефону.

/* ============================================================
   TEST SETTINGS — temporary smoke-test for the attachments layer.
   Will be removed once attachments are wired into transactions
   in Stage 2.
   ============================================================ */
function renderTestSettings() {
  const files = state.testFiles || [];
  const totalSize = files.reduce((s, f) => s + (f.size || 0), 0);
  const q = state.testQuota;
  const persistTxt = state.testPersistent === null
    ? '<span class="muted">не запитано</span>'
    : state.testPersistent
      ? '<span style="color: var(--income)">так, гарантовано не видалиться</span>'
      : '<span style="color: var(--expense)">ні, браузер може видалити</span>';

  return `
    <section style="margin-top: 6px;">
      <div class="section-head">🧪 Тест вкладень (Етап 1)</div>
      <div style="font-size: 12px; color: var(--text-2); line-height: 1.5; margin-bottom: 14px;">
        Тимчасова сторінка для перевірки фундаменту. Тут можна додавати файли «в порожнечу» (без прив'язки до транзакції), переглядати їх і видаляти. У наступному етапі прикріплення з'являться всередині транзакцій.
      </div>

      <input type="file" id="test-file-input" accept="*" multiple style="display:none">
      <input type="file" id="test-photo-input" accept="image/*" capture="environment" multiple style="display:none">
      <input type="file" id="test-gallery-input" accept="image/*" multiple style="display:none">

      <button class="add-btn" data-action="test-pick-camera" style="border-color: var(--accent); color: var(--accent);">📷 Зробити фото</button>
      <button class="add-btn" data-action="test-pick-gallery">🖼️ Вибрати з галереї</button>
      <button class="add-btn" data-action="test-pick-file">📎 Додати файл</button>
    </section>

    <section>
      <div class="section-head">Сховище</div>
      <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 12px; line-height: 1.7;">
        <div>Файлів: <strong>${files.length}</strong></div>
        <div>Загальний розмір: <strong>${fmtBytes(totalSize)}</strong></div>
        <div>Persistence: ${persistTxt}</div>
        ${q ? `
          <div>Використано в браузері: <strong>${fmtBytes(q.usage)}</strong> з ${fmtBytes(q.quota)} (${q.quota ? ((q.usage / q.quota) * 100).toFixed(1) : '—'}%)</div>
        ` : `<div class="muted">Квота: натисни «Оновити» нижче</div>`}
      </div>
      <button class="add-btn" data-action="test-refresh-stats" style="margin-top: 10px;">🔄 Оновити статус</button>
      <button class="add-btn" data-action="test-request-persist">🔒 Запитати persistence</button>
    </section>

    <section>
      <div class="section-head">Збережені файли</div>
      ${files.length === 0 ? `
        <div style="color: var(--text-3); font-size: 13px; padding: 14px 4px; font-style: italic;">Поки порожньо. Додай файл вище — і він з'явиться тут.</div>
      ` : `
        <div style="display: flex; flex-direction: column; gap: 8px;">
          ${files.map(f => renderTestFileRow(f)).join('')}
        </div>
        <button class="add-btn danger" data-action="test-clear-all" style="margin-top: 14px; border-color: var(--danger); color: var(--danger);">🗑️ Видалити всі файли</button>
      `}
    </section>

    <section>
      <div style="font-size: 11px; color: var(--text-3); line-height: 1.6; padding: 10px 4px;">
        Що перевіряємо: фото з камери стискається до &lt;500 КБ, PDF зберігається як є, файл відкривається через «Переглянути», після перезапуску додатку дані лишаються на місці.
      </div>
    </section>
  `;
}

function renderTestFileRow(f) {
  const isImage = (f.mime || '').startsWith('image/');
  const date = new Date(f.addedAt).toLocaleString('uk-UA', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
  return `
    <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px;">
      <div style="font-size: 22px; flex-shrink: 0;">${isImage ? '🖼️' : f.mime === 'application/pdf' ? '📄' : '📎'}</div>
      <div style="flex: 1; min-width: 0;">
        <div style="font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(f.name)}</div>
        <div style="font-size: 11px; color: var(--text-3); margin-top: 2px;">${fmtBytes(f.size)} · ${escapeHtml(f.mime || '?')} · ${date}</div>
      </div>
      <button data-action="test-view-file" data-id="${f.id}" style="font-size: 11px; padding: 6px 10px; border: 1px solid var(--border-2); border-radius: 6px; color: var(--text-2);">Відкрити</button>
      <button data-action="test-delete-file" data-id="${f.id}" style="font-size: 16px; padding: 4px 8px; color: var(--danger);">×</button>
    </div>
  `;
}

function renderEventsSettings() {
  const events = state.data.events;
  const active = events.filter(e => !e.archived);
  const archived = events.filter(e => e.archived);

  let html = `
    <button class="add-btn" data-action="open-new-event">+ Додати подію</button>
  `;

  if (events.length === 0) {
    html += `
      <div class="events-explainer">
        <p style="margin-bottom: 8px;"><strong style="color: var(--text)">Що це</strong></p>
        <p>Подія — це окремий «проект» для групи витрат: подорож, ремонт, святкування. Транзакції можна (опційно) прив'язувати до події, щоб потім бачити, скільки витрачено на неї всього.</p>
        <p style="margin-top: 8px;">Згодом на подію можна буде поставити бюджет.</p>
      </div>
    `;
    return html;
  }

  if (active.length > 0) {
    html += `<section style="margin-top: 22px;"><div class="section-head">Активні · ${active.length}</div>`;
    for (const ev of active) {
      const txCount = state.data.transactions.filter(t => t.eventId === ev.id).length;
      html += `
        <div class="cat-row">
          <span class="swatch" style="background:${ev.color}"></span>
          <span class="name">${escapeHtml(ev.name)}</span>
          ${txCount > 0 ? `<span class="event-count">${txCount} тр.</span>` : ''}
          <button class="del" data-action="edit-event" data-id="${ev.id}">${ICONS.edit}</button>
          <button class="del" data-action="del-event" data-id="${ev.id}">${ICONS.trash}</button>
        </div>
      `;
    }
    html += `</section>`;
  }

  if (archived.length > 0) {
    html += `
      <section>
        <div class="section-head">Архівні · ${archived.length}</div>
        ${archived.map(ev => `
          <div class="cat-row archived-row">
            <span class="swatch" style="background:${ev.color}; opacity: 0.5"></span>
            <span class="name" style="opacity: 0.6">${escapeHtml(ev.name)}</span>
            <button class="del" data-action="unarchive-event" data-id="${ev.id}" title="Розархівувати">${ICONS.archive}</button>
          </div>
        `).join('')}
      </section>
    `;
  }

  return html;
}

function renderRatesSettings() {
  const rates = state.data.fxRates || {};
  // Display as "1 EUR = X CUR" — inverse of stored rate
  // Stored rates[CUR] = how many EUR 1 unit of CUR equals
  // So 1 EUR = 1 / rates[CUR] units of CUR
  const display = (cur) => {
    const r = rates[cur];
    if (!r) return '';
    return (1 / r).toFixed(cur === 'UAH' ? 2 : 4);
  };

  return `
    <section style="margin-top: 6px;">
      <div class="section-head">Курси відносно EUR</div>
      <div class="rates-hint">Вводь у форматі «1 EUR = X». Курси вживаються для перекладів і зведеної статистики.</div>
      ${['UAH', 'USD', 'GBP'].map(cur => `
        <div class="rate-row">
          <div class="rate-label">
            <span class="rate-eur">1 EUR</span>
            <span class="rate-eq">=</span>
            <input class="input rate-input num"
              type="number" inputmode="decimal" step="0.0001"
              data-form="rate_${cur}"
              value="${display(cur)}"
              placeholder="0">
            <span class="rate-cur">${cur}</span>
          </div>
        </div>
      `).join('')}
      <div class="rates-tip">Зміни зберігаються автоматично після виходу з поля.</div>
    </section>
  `;
}

function renderCategoriesSettings() {
  const cats = state.data.categories;
  const active = cats.filter(c => !c.archived);
  const archived = cats.filter(c => c.archived);
  const inc = active.filter(c => c.type === 'Income');
  const exp = active.filter(c => c.type === 'Expense');

  let html = `
    <button class="add-btn" data-action="open-new-cat">+ Додати категорію</button>
  `;

  if (cats.length === 0) {
    html += `<div class="empty"><div class="hint">Ще немає категорій</div></div>`;
    return html;
  }

  if (inc.length > 0) {
    html += `<section style="margin-top: 22px;"><div class="section-head">Дохід · ${inc.length}</div>`;
    for (const c of inc) html += renderCatRow(c);
    html += `</section>`;
  }
  if (exp.length > 0) {
    html += `<section><div class="section-head">Витрати · ${exp.length}</div>`;
    for (const c of exp) html += renderCatRow(c);
    html += `</section>`;
  }

  if (archived.length > 0) {
    html += `
      <section>
        <div class="section-head">Архівовані · ${archived.length}</div>
        ${archived.map(c => renderArchivedCatRow(c)).join('')}
      </section>
    `;
  }

  return html;
}

function renderCatRow(c) {
  return `
    <div class="cat-row">
      <span class="swatch" style="background:${c.color}"></span>
      <span class="name">${escapeHtml(c.name)}</span>
      <button class="del" data-action="edit-cat" data-id="${c.id}">${ICONS.edit}</button>
      <button class="del" data-action="del-cat" data-id="${c.id}">${ICONS.trash}</button>
    </div>
  `;
}

function renderArchivedCatRow(c) {
  return `
    <div class="cat-row archived-row">
      <span class="swatch" style="background:${c.color}; opacity: 0.5"></span>
      <span class="name" style="opacity: 0.6">${escapeHtml(c.name)}</span>
      <span class="type-pill" style="opacity: 0.6">${c.type === 'Income' ? 'Дохід' : 'Витрата'}</span>
      <button class="del" data-action="unarchive-cat" data-id="${c.id}" title="Розархівувати">${ICONS.archive}</button>
    </div>
  `;
}

function renderAboutSettings() {
  const theme = state.data.theme || 'system';
  return `
    <section style="margin-top: 6px;">
      <div class="section-head">Тема</div>
      <div class="theme-picker">
        <button class="${theme === 'system' ? 'active' : ''}" data-action="set-theme" data-key="system">
          <span class="ico">${ICONS.systemTheme}</span>
          <span>Системна</span>
        </button>
        <button class="${theme === 'light' ? 'active' : ''}" data-action="set-theme" data-key="light">
          <span class="ico">${ICONS.lightTheme}</span>
          <span>Світла</span>
        </button>
        <button class="${theme === 'dark' ? 'active' : ''}" data-action="set-theme" data-key="dark">
          <span class="ico">${ICONS.darkTheme}</span>
          <span>Темна</span>
        </button>
      </div>
    </section>

    <div style="padding: 20px 0; color: var(--text-2); font-size: 13px; line-height: 1.6;">
      <p style="margin-bottom: 12px;"><strong style="color: var(--text)">Фінанси · MVP</strong> <span style="font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-3); margin-left: 6px;">v${APP_VERSION}</span></p>
      <p style="margin-bottom: 12px;">Особистий облік. Усі дані зберігаються тільки на цьому пристрої.</p>
      <p style="margin-bottom: 12px;">v1.11.0: повторювані транзакції (частина 2 з 2). У картці підтвердженої транзакції тапни «Зробити повторюваною» — обери щотижня / щомісяця / щороку. Апка автоматично створюватиме нові заплановані за розкладом.</p>

      <div style="padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-size: 12px;">
        <strong style="color: var(--text); display: block; margin-bottom: 6px;">Якщо щось працює дивно</strong>
        <span style="color: var(--text-3);">Найімовірніше — кеш браузера. Закрий вкладку, у Chrome відкрий: Меню → «Очистити дані сайту» для цього домена. Якщо PWA з домашнього екрану — видали і додай заново. Свіжа версія завжди показує номер цієї збірки тут.</span>
      </div>
    </div>

function renderFab() {
  // Hide on settings + stats (no creation context)
  if (state.view === 'settings' || state.view === 'stats') return '';
  // In account-detail sub-view, "+" creates a transaction for THIS account
  if (state.subView && state.subView.type === 'accountDetail') {
    return `<button class="fab" data-action="open-new-tx-for-account" data-id="${state.subView.id}">${ICONS.plus}</button>`;
  }
  const action = state.view === 'accounts' ? 'open-new-acc' : 'open-new-tx';
  return `<button class="fab" data-action="${action}">${ICONS.plus}</button>`;
}

function renderNav() {
  const tabs = [
    { key: 'transactions', label: 'Список', icon: ICONS.list },
    { key: 'accounts',     label: 'Рахунки', icon: ICONS.wallet },
    { key: 'stats',        label: 'Статистика', icon: ICONS.chart },

  ];
  return `
    <nav class="tabs">
      <div class="container">
        ${tabs.map(t => `
          <button class="${state.view === t.key ? 'active' : ''}" data-action="tab" data-key="${t.key}">
            ${t.icon}
            <span class="tab-lbl">${t.label}</span>
          </button>
        `).join('')}
      </div>
    </nav>
  `;
}

   RENDERERS — MODALS
   ============================================================ */

function renderModal() {
  switch (state.modal) {
    case 'newTx':         return renderNewTxModal();
    case 'newAcc':        return renderNewAccModal();
    case 'newCat':        return renderNewCatModal();
    case 'newEvent':      return renderNewEventModal();
    case 'txDetail':      return renderTxDetail();
    case 'confirmDelTx':  return renderConfirmDelTx();
    case 'confirmDelAcc': return renderConfirmDelAcc();
    case 'confirmDelCat': return renderConfirmDelCat();
    case 'confirmDelEvent': return renderConfirmDelEvent();
    case 'confirmArchiveAcc': return renderConfirmArchiveAcc();
    case 'confirmArchiveCat': return renderConfirmArchiveCat();
    case 'confirmArchiveEvent': return renderConfirmArchiveEvent();
    case 'confirmImport': return renderConfirmImport();
    case 'infoRestored':  return renderInfoRestored();
    case 'infoBlocked':   return renderBlocked();
    case 'backupSaved':   return renderBackupSaved();
    case 'makeRecurring': return renderMakeRecurringModal();
    case 'editRule':      return renderEditRuleModal();
    case 'confirmDelRule': return renderConfirmDelRule();
  }
  return '';
}

function renderMakeRecurringModal() {
  const f = state.modalForm;
  const refDate = f.txDate ? isoToDate(f.txDate) : new Date();
  const day = refDate.getDate();
  const dayOfWeek = ['Нд', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'][refDate.getDay()];
  const month = MONTHS_FULL[refDate.getMonth()];

  const valid = !!f.frequency;

  return `
    <div class="scrim">
      <div class="sheet">
        <div class="sheet-head">
          <span class="title">Зробити повторюваною</span>
          <button class="close" data-action="close-modal">${ICONS.close}</button>
        </div>
        <div class="sheet-body">

          <div style="font-size: 12px; color: var(--text-3); margin-bottom: 14px; line-height: 1.5;">
            Будуть створюватись заплановані транзакції за розкладом. Кожну треба буде підтверджувати.
          </div>

          <div class="field">
            <div class="field-label"><span class="lbl">Періодичність</span></div>
            <div class="toggle toggle-3">
              <button class="${f.frequency === 'weekly' ? 'active accent-on' : ''}" data-action="set-rule-freq" data-key="weekly">
                <span style="font-size: 11px; font-weight: 500;">Щотижня</span>
                <span style="font-size: 9px; opacity: 0.8; margin-top: 2px;">кожен ${dayOfWeek}</span>
              </button>
              <button class="${f.frequency === 'monthly' ? 'active accent-on' : ''}" data-action="set-rule-freq" data-key="monthly">
                <span style="font-size: 11px; font-weight: 500;">Щомісяця</span>
                <span style="font-size: 9px; opacity: 0.8; margin-top: 2px;">${day}-го числа</span>
              </button>
              <button class="${f.frequency === 'yearly' ? 'active accent-on' : ''}" data-action="set-rule-freq" data-key="yearly">
                <span style="font-size: 11px; font-weight: 500;">Щороку</span>
                <span style="font-size: 9px; opacity: 0.8; margin-top: 2px;">${day} ${month.slice(0, 3).toLowerCase()}</span>
              </button>
            </div>
          </div>

          <div class="field">
            <div class="field-label"><span class="lbl">Дата завершення</span><span class="opt">опційно</span></div>
            <input class="input" type="date" value="${escapeAttr(f.endDate || '')}" data-form="endDate">
            <div style="font-size: 11px; color: var(--text-3); margin-top: 6px; font-style: italic;">Залиш порожнім — правило діятиме вічно</div>
          </div>

        </div>
        <div class="sheet-foot">
          <button class="btn secondary" data-action="close-modal">Скасувати</button>
          <button class="btn primary" data-action="save-make-recurring" ${valid ? '' : 'disabled'}>Створити правило</button>
        </div>
      </div>
    </div>
  `;
}

function renderEditRuleModal() {
  const f = state.modalForm;
  const rule = state.data.recurringRules.find(r => r.id === f.editingRuleId);
  if (!rule) return '';
  const refDate = isoToDate(rule.startDate);
  const day = refDate.getDate();
  const dayOfWeek = ['Нд', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'][rule.dayOfWeek];
  const month = MONTHS_FULL[rule.monthOfYear - 1];

  return `
    <div class="scrim">
      <div class="sheet">
        <div class="sheet-head">
          <span class="title">Правило</span>
          <button class="close" data-action="close-modal">${ICONS.close}</button>
        </div>
        <div class="sheet-body">

          ${renderRuleSummary(rule)}

          <div class="field" style="margin-top: 18px;">
            <div class="field-label"><span class="lbl">Періодичність</span></div>
            <div class="toggle toggle-3">
              <button class="${f.frequency === 'weekly' ? 'active accent-on' : ''}" data-action="set-rule-freq" data-key="weekly">
                <span style="font-size: 11px; font-weight: 500;">Щотижня</span>
                <span style="font-size: 9px; opacity: 0.8; margin-top: 2px;">${dayOfWeek}</span>

function renderRuleSummary(rule) {
  const acc = findAccount(rule.accountId);
  const cat = findCategory(rule.categoryId);
  const toAcc = findAccount(rule.toAccountId);
  const fromCur = acc ? acc.currency : 'EUR';
  let label, amountHtml;
  if (rule.type === 'Transfer') {
    label = 'Переказ';
    const toCur = rule.toCurrency || fromCur;
    amountHtml = `${fmtMoney(rule.amount, false, fromCur)}${fromCur === toCur ? '' : ` → ${fmtMoney(rule.toAmount, false, toCur)}`}`;
  } else {
    label = cat ? cat.name : '—';
    amountHtml = (rule.type === 'Income' ? '+' : '−') + fmtMoney(rule.amount, false, fromCur).replace('−','').replace('+','');
  }
  return `
    <div class="rule-summary">
      <div class="rule-name serif">${escapeHtml(label)}</div>
      <div class="rule-amount num">${amountHtml}</div>
      <div class="rule-meta">
        ${acc ? escapeHtml(acc.name) : '—'}${rule.type === 'Transfer' && toAcc ? ' → ' + escapeHtml(toAcc.name) : ''}
        ${rule.paused ? ' · <span style="color: var(--expense)">призупинено</span>' : ''}
      </div>
    </div>
  `;
}

  return `

      ${ICONS.repeat} <span>${freqLabel}${rule.paused ? ' · призупинено' : ''}</span>

  let valid = false;
  if (isTransfer) {
    const fromAcc = accs.find(a => a.id === f.accountId);
    const toAcc = accs.find(a => a.id === f.toAccountId);
    const amtOk = f.amount && parseFloat(f.amount) > 0;
    const diffAccs = f.accountId && f.toAccountId && f.accountId !== f.toAccountId;
    const toAmtOk = (fromAcc && toAcc && fromAcc.currency === toAcc.currency)
                    || (f.toAmount && parseFloat(f.toAmount) > 0);
    valid = fromAcc && toAcc && diffAccs && amtOk && toAmtOk;
  } else {
    const availableCats = state.data.categories.filter(c => c.type === f.type && !c.archived);
    const validAcc = f.accountId && accs.some(a => a.id === f.accountId);
    const validCat = f.categoryId && availableCats.some(c => c.id === f.categoryId);
    const validAmt = f.amount && parseFloat(f.amount) > 0;
    valid = validAcc && validCat && validAmt;
  }

  const title = isEdit
    ? (isTransfer ? 'Редагувати переказ' : 'Редагувати транзакцію')
    : (isTransfer ? 'Новий переказ' : 'Нова транзакція');

  return `
    <div class="scrim">
      <div class="sheet">
        <div class="sheet-head">
          <span class="title">${title}</span>
          <button class="close" data-action="close-modal">${ICONS.close}</button>
        </div>
        <div class="sheet-body">

          <div class="field">
            <div class="toggle toggle-3">
              <button class="${f.type === 'Income' ? 'active income' : ''}" data-action="tx-type" data-key="Income">
                <span class="ico">${ICONS.down}</span>
                <span>Дохід</span>
              </button>
              <button class="${f.type === 'Expense' ? 'active expense' : ''}" data-action="tx-type" data-key="Expense">
                <span class="ico">${ICONS.up}</span>
                <span>Витрата</span>
              </button>
              <button class="${f.type === 'Transfer' ? 'active transfer' : ''}" data-action="tx-type" data-key="Transfer">
                <span class="ico">${ICONS.swap}</span>
                <span>Переказ</span>
              </button>
            </div>
          </div>

          ${isTransfer
            ? renderTxFormTransfer(f, accs)
            : renderTxFormRegular(f, accs)}

          <div class="field">
            <div class="field-label">
              <span class="lbl">${f.isScheduled ? 'Запланована на' : 'Дата'}</span>
              <button class="toggle-scheduled ${f.isScheduled ? 'on' : ''}" data-action="toggle-scheduled">
                ${ICONS.clock} ${f.isScheduled ? 'Запланована' : 'Запланувати'}
              </button>
            </div>
            <input class="input" type="date" value="${escapeAttr(f.date || todayISO())}" data-form="date">
            ${f.isScheduled ? '<div style="font-size:11px;color:var(--text-3);margin-top:6px;font-style:italic">Не вплине на баланс, поки не підтвердиш</div>' : ''}
          </div>

          <div class="field">
            <div class="field-label"><span class="lbl">Примітка</span><span class="opt">опційно</span></div>
            <input class="input" type="text" placeholder="" value="${escapeAttr(f.note || '')}" data-form="note">
          </div>

        </div>
        <div class="sheet-foot">
