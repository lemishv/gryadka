/* ============================================================
   ESCAPING
   ============================================================ */

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }

/* ============================================================
   EVENT HANDLING
   ============================================================ */

function closeModalOrBack() {
  if (state.pendingTx) {
    state.modal = 'newTx';
    state.modalForm = state.pendingTx;
    state.pendingTx = null;
    state.modalCtx = null;
  } else {
    state.modal = null;
    state.modalCtx = null;
    state.modalForm = {};
  }
}

function updateCrossCurHint() {
  const hint = document.querySelector('.cross-cur-hint');
  if (!hint) return;
  const f = state.modalForm;
  const accs = state.data.accounts;
  const from = accs.find(a => a.id === f.accountId);
  const to = accs.find(a => a.id === f.toAccountId);
  if (!from || !to || from.currency === to.currency) return;
  const amt = parseFloat(f.amount);
  if (isNaN(amt) || amt <= 0) {
    hint.textContent = 'Розрахується автоматично за курсом, можеш скорегувати.';
  } else {
    const converted = convertCurrency(amt, from.currency, to.currency);
    hint.textContent = `За курсом ≈ ${fmtMoney(converted, false, to.currency)}. Скорегуй якщо банк дав інше.`;
  }
}

function autoFillToAmount() {
  const f = state.modalForm;
  const accs = state.data.accounts;
  const from = accs.find(a => a.id === f.accountId);
  const to = accs.find(a => a.id === f.toAccountId);
  if (!from || !to) return;
  if (from.currency === to.currency) return;
  // Only autofill if user hasn't manually edited toAmount (we track via toAmountEdited)
  if (state.modalForm.toAmountEdited) return;
  const amt = parseFloat(f.amount);
  if (isNaN(amt) || amt <= 0) return;
  const converted = convertCurrency(amt, from.currency, to.currency);
  state.modalForm.toAmount = converted.toFixed(2);
}

function setupEvents() {
  const app = document.getElementById('app');

  // Click delegation
  app.addEventListener('click', (e) => {
    // If clicked directly on the scrim background (not inside the sheet), close modal
    if (e.target.classList && e.target.classList.contains('scrim')) {
      closeModalOrBack();
      render();
      return;
    }
    const trigger = e.target.closest('[data-action]');
    if (!trigger) return;
    const action = trigger.dataset.action;
    const key = trigger.dataset.key;
    const id = trigger.dataset.id;
    handleAction(action, key, id, trigger);
  });

  // Input changes (for modal forms)
  app.addEventListener('input', (e) => {
    if (e.target.dataset.form) {
      const name = e.target.dataset.form;
      state.modalForm[name] = e.target.value;

      // Cross-currency transfer: live update of toAmount and hint when "from amount" changes
      if (state.modal === 'newTx' && state.modalForm.type === 'Transfer') {
        if (name === 'amount' && !state.modalForm.toAmountEdited) {
          autoFillToAmount();
          // Update the DOM directly — no re-render, no focus loss
          const toInput = document.getElementById('tx-to-amount');
          if (toInput) toInput.value = state.modalForm.toAmount || '';
          updateCrossCurHint();
        } else if (name === 'amount') {
          updateCrossCurHint();
        } else if (name === 'toAmount') {
          state.modalForm.toAmountEdited = true;
        }
      }

      toggleSubmitButton();
    }
  });

  // Change events: only for SELECT elements.
  // Text inputs fire 'change' on blur (e.g. when keyboard opens/closes on Android),
  // which would re-render and steal focus — so we exclude them here.
  app.addEventListener('change', (e) => {
    if (e.target.dataset.form && e.target.tagName === 'SELECT') {
      const val = e.target.value;
      // Special case: "+ New category" option inside the category select
      if (e.target.dataset.form === 'categoryId' && val === '__new__') {
        const f = state.modalForm;
        state.pendingTx = { ...f, categoryId: '' };  // clear placeholder
        state.modal = 'newCat';
        state.modalForm = { name: '', type: f.type || 'Expense', color: nextAutoColor() };
        vibrate(10);
        render();
        return;
      }
      state.modalForm[e.target.dataset.form] = val;

      // For Transfer: when accounts change, auto-fill toAmount via conversion
      // (only if user hasn't typed toAmount themselves yet)
      if (state.modal === 'newTx' && state.modalForm.type === 'Transfer') {
        autoFillToAmount();
      }

      render();
    }
  });

  // File input change — for backup restore. Listen on document because the input
  // is rendered inside Settings and may be replaced on re-renders.
  document.addEventListener('change', (e) => {
    if (e.target.id === 'backup-file-input' && e.target.files && e.target.files[0]) {
      state.pendingImportFile = e.target.files[0];
      handleAction('confirm-import-backup');
    }
    // Stage 1 test inputs
    if ((e.target.id === 'test-file-input' || e.target.id === 'test-photo-input' || e.target.id === 'test-gallery-input')
        && e.target.files && e.target.files.length) {
      handleTestFilesPicked(Array.from(e.target.files));
    }
  });

  // Blur on rate inputs — save the new rate when user finishes editing.
  app.addEventListener('blur', (e) => {
    if (e.target.dataset && e.target.dataset.form && e.target.dataset.form.startsWith('rate_')) {
      const cur = e.target.dataset.form.slice(5);
      const inv = parseFloat(e.target.value);
      if (!isNaN(inv) && inv > 0) {
        // User entered "1 EUR = inv CUR" → store rates[CUR] = 1/inv
        state.data.fxRates[cur] = 1 / inv;
        saveData();
      }
    }
  }, true);  // useCapture true — 'blur' doesn't bubble
}

function toggleSubmitButton() {
  const btn = document.querySelector('.sheet-foot .btn.primary');
  if (!btn) return;
  const f = state.modalForm;
  let valid = false;
  if (state.modal === 'newTx') {
    if (f.type === 'Transfer') {
      const accs = state.data.accounts.filter(a => !a.archived);
      const fromAcc = accs.find(a => a.id === f.accountId);
      const toAcc = accs.find(a => a.id === f.toAccountId);
      const amtOk = f.amount && parseFloat(f.amount) > 0;
      const diffAccs = f.accountId && f.toAccountId && f.accountId !== f.toAccountId;
      const toAmtOk = (fromAcc && toAcc && fromAcc.currency === toAcc.currency)
                      || (f.toAmount && parseFloat(f.toAmount) > 0);
      valid = fromAcc && toAcc && diffAccs && amtOk && toAmtOk;
    } else {
      valid = f.accountId && f.categoryId && f.amount && parseFloat(f.amount) > 0;
    }
  } else if (state.modal === 'newAcc') {
    valid = f.name && f.name.trim().length > 0 && f.currency && !state.data.accounts.some(a => a.name === f.name.trim());
  } else if (state.modal === 'newCat') {
    valid = f.name && f.name.trim().length > 0 && f.type && !state.data.categories.some(c => c.name === f.name.trim() && c.type === f.type);
  }
  btn.disabled = !valid;
}

function handleAction(action, key, id, trigger) {
  switch (action) {
    case 'set-view-cur':
      state.data.viewCurrency = key;
      saveData();
      vibrate(8);
      render();
      break;

    case 'tab':
      vibrate(8);
      state.view = key;
      state.subView = null;
      render();
      break;

    case 'open-acc-detail':
      state.subView = { type: 'accountDetail', id };
      vibrate(8);
      render();
      break;

    case 'back-to-accounts':
      state.subView = null;
      vibrate(8);
      render();
      break;

    case 'open-tx-detail': {
      const tx = state.data.transactions.find(t => t.id === id);
      if (!tx) return;
      state.modal = 'txDetail';
      state.modalCtx = tx;
      vibrate(10);
      render();
      break;
    }

    case 'edit-tx': {
      const tx = state.data.transactions.find(t => t.id === id);
      if (!tx) return;
      state.modal = 'newTx';
      state.modalForm = {
        editingId: tx.id,
        type: tx.type === 'Opening' ? 'Income' : tx.type,  // Opening can't be edited as Opening, treat as Income
        date: isScheduled(tx) ? tx.scheduledFor : tx.date,
        amount: String(Math.abs(tx.amount)),
        accountId: tx.accountId,
        categoryId: tx.categoryId || '',
        toAccountId: tx.toAccountId || '',
        toAmount: tx.toAmount != null ? String(tx.toAmount) : '',
        toAmountEdited: true,
        eventId: tx.eventId || '',
        isScheduled: isScheduled(tx),
        note: tx.note || ''
      };
      vibrate(10);
      render();
      break;
    }

    case 'del-tx-from-detail': {
      const tx = state.data.transactions.find(t => t.id === id);
      if (!tx) return;
      state.modal = 'confirmDelTx';
      state.modalCtx = tx;
      vibrate(10);
      render();
      break;
    }

    case 'del-acc-from-detail': {
      const acc = state.data.accounts.find(a => a.id === id);
      if (!acc) return;
      if (accountHasTransactions(id)) {
        // Offer archiving instead of forbidding
        state.modal = 'confirmArchiveAcc';
        state.modalCtx = acc;
        vibrate(10);
        render();
        return;
      }
      state.modal = 'confirmDelAcc';
      state.modalCtx = acc;
      vibrate(10);
      render();
      break;
    }

    case 'stab':
      state.settingsTab = key;
      render();
      break;

    case 'open-new-tx':
      if (state.data.accounts.length === 0) {
        state.modal = 'infoBlocked';
        state.modalCtx = 'Спочатку додай хоча б один рахунок у вкладці «Рахунки».';
        render();
        return;
      }
      if (state.data.categories.length === 0) {
        state.modal = 'infoBlocked';
        state.modalCtx = 'Спочатку додай хоча б одну категорію в Налаштуваннях.';
        render();
        return;
      }
      state.modal = 'newTx';
      state.modalForm = { type: 'Expense', date: todayISO(), amount: '', accountId: '', categoryId: '', toAccountId: '', toAmount: '', toAmountEdited: false, eventId: '', isScheduled: false, note: '' };
      vibrate(10);
      render();
      break;

    case 'open-new-tx-for-account':
      if (state.data.categories.length === 0) {
        state.modal = 'infoBlocked';
        state.modalCtx = 'Спочатку додай хоча б одну категорію в Налаштуваннях.';
        render();
        return;
      }
      state.modal = 'newTx';
      state.modalForm = { type: 'Expense', date: todayISO(), amount: '', accountId: id, categoryId: '', toAccountId: '', toAmount: '', toAmountEdited: false, eventId: '', isScheduled: false, note: '' };
      vibrate(10);
      render();
      break;

    case 'open-new-cat-from-tx': {
      // Stash current new-tx form, open new-cat with the same type, return after save
      const f = state.modalForm;
      state.pendingTx = { ...f };
      state.modal = 'newCat';
      state.modalForm = { name: '', type: f.type || 'Expense', color: nextAutoColor() };
      vibrate(10);
      render();
      break;
    }

    case 'open-new-acc':
      state.modal = 'newAcc';
      state.modalForm = { name: '', currency: 'EUR', color: nextAutoColor(), openingBalance: '' };
      vibrate(10);
      render();
      break;

    case 'open-new-cat':
      state.modal = 'newCat';
      state.modalForm = { name: '', type: 'Expense', color: nextAutoColor() };
      vibrate(10);
      render();
      break;

    case 'toggle-scheduled':
      state.modalForm.isScheduled = !state.modalForm.isScheduled;
      // If turning ON and date is today, suggest tomorrow as a sensible default
      if (state.modalForm.isScheduled && state.modalForm.date === todayISO()) {
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        state.modalForm.date = tomorrow.getFullYear() + '-' +
          String(tomorrow.getMonth() + 1).padStart(2, '0') + '-' +
          String(tomorrow.getDate()).padStart(2, '0');
      }
      vibrate(8);
      render();
      break;

    case 'confirm-scheduled': {
      // Confirm the scheduled transaction as-is (no edits)
      confirmScheduledTransaction(id);
      // Close modal if we came from tx-detail
      if (state.modal === 'txDetail') {
        state.modal = null;
        state.modalCtx = null;
      }
      vibrate([20, 30, 20]);
      render();
      break;
    }

    case 'skip-scheduled': {
      // "Skip" means the payment didn't happen — just delete the scheduled tx
      deleteTransaction(id);
      if (state.modal === 'txDetail') {
        state.modal = null;
        state.modalCtx = null;
      }
      vibrate([20, 30, 20]);
      // If this was a recurring scheduled tx, generate the next occurrence
      // (so user always has one upcoming visible)
      generateScheduledForRules();
      render();
      break;
    }

    case 'open-make-recurring': {
      const tx = state.data.transactions.find(t => t.id === id);
      if (!tx) return;
      state.modal = 'makeRecurring';
      state.modalForm = {
        txId: tx.id,
        txDate: tx.date,
        frequency: 'monthly',
        endDate: ''
      };
      vibrate(10);
      render();
      break;
    }

    case 'set-rule-freq':
      state.modalForm.frequency = key;
      vibrate(8);
      render();
      break;

    case 'save-make-recurring': {
      const f = state.modalForm;
      createRuleFromTransaction(f.txId, {
        frequency: f.frequency,
        endDate: f.endDate || null
      });
      state.modal = null;
      state.modalForm = {};
      vibrate([10, 40, 30]);
      render();
      break;
    }

    case 'open-rule': {
      const rule = findRule(id);
      if (!rule) return;
      state.modal = 'editRule';
      state.modalForm = {
        editingRuleId: rule.id,
        frequency: rule.frequency,
        endDate: rule.endDate || ''
      };
      vibrate(10);
      render();
      break;
    }

    case 'save-rule-changes': {
      const f = state.modalForm;
      updateRule(f.editingRuleId, {
        frequency: f.frequency,
        endDate: f.endDate || null
      });
      state.modal = null;
      state.modalForm = {};
      vibrate([10, 40, 30]);
      render();
      break;
    }

    case 'toggle-rule-pause': {
      toggleRulePause(id);
      // Re-open the rule editor to show updated status
      const rule = findRule(id);
      if (rule) {
        state.modalForm = {
          editingRuleId: rule.id,
          frequency: rule.frequency,
          endDate: rule.endDate || ''
        };
      }
      vibrate([10, 30, 10]);
      render();
      break;
    }

    case 'del-rule': {
      const rule = findRule(id);
      if (!rule) return;
      state.modal = 'confirmDelRule';
      state.modalCtx = rule;
      vibrate(10);
      render();
      break;
    }

    case 'do-del-rule': {
      deleteRule(id);
      state.modal = null;
      state.modalCtx = null;
      state.modalForm = {};
      vibrate([20, 30, 20]);
      render();
      break;
    }

    case 'tx-type':
      state.modalForm.type = key;
      // Reset fields that don't apply to the new type
      if (key === 'Transfer') {
        state.modalForm.categoryId = '';
      } else {
        state.modalForm.toAccountId = '';
        state.modalForm.toAmount = '';
        state.modalForm.categoryId = '';  // categories filtered by Income/Expense
      }
      render();
      break;

    case 'cat-type':
      state.modalForm.type = key;
      render();
      break;

    case 'pick-currency':
      state.modalForm.currency = key;
      render();
      break;

    case 'pick-color':
      state.modalForm.color = key;
      render();
      break;

    case 'save-tx': {
      const f = state.modalForm;
      const payload = {
        date: f.isScheduled ? f.date : f.date,  // dates are the same either way; UI just labels them
        type: f.type,
        amount: f.amount,
        accountId: f.accountId,
        categoryId: f.type === 'Transfer' ? null : f.categoryId,
        note: f.note || '',
        toAccountId: f.toAccountId,
        toAmount: f.toAmount,
        eventId: f.eventId || null,
        scheduledFor: f.isScheduled ? f.date : null
      };
      if (f.editingId) {
        updateTransaction(f.editingId, payload);
      } else {
        createTransaction(payload);
      }
      state.modal = null;
      state.modalForm = {};
      vibrate([10, 40, 30]);
      render();
      break;
    }

    case 'save-acc': {
      const f = state.modalForm;
      if (f.editingId) {
        updateAccount(f.editingId, {
          name: f.name,
          color: f.color,
          goalAmount: f.goalAmount,
          goalDescription: f.goalDescription
        });
      } else {
        createAccount({
          name: f.name,
          currency: f.currency || 'EUR',
          color: f.color,
          openingBalance: f.openingBalance,
          goalAmount: f.goalAmount,
          goalDescription: f.goalDescription
        });
      }
      state.modal = null;
      state.modalForm = {};
      vibrate([10, 40, 30]);
      render();
      break;
    }

    case 'edit-acc': {
      const acc = state.data.accounts.find(a => a.id === id);
      if (!acc) return;
      state.modal = 'newAcc';
      state.modalForm = {
        editingId: acc.id,
        name: acc.name,
        currency: acc.currency,
        color: acc.color,
        goalAmount: acc.goal ? String(acc.goal.amount) : '',
        goalDescription: acc.goal ? acc.goal.description || '' : ''
      };
      vibrate(10);
      render();
      break;
    }

    case 'archive-acc-from-detail': {
      archiveAccount(id);
      state.modal = null;
      state.subView = null;
      vibrate([20, 30, 20]);
      render();
      break;
    }

    case 'unarchive-acc': {
      unarchiveAccount(id);
      vibrate([10, 30, 10]);
      render();
      break;
    }

    case 'save-cat': {
      const f = state.modalForm;
      if (f.editingId) {
        updateCategory(f.editingId, {
          name: f.name,
          type: f.type,
          color: f.color
        });
        state.modal = null;
        state.modalForm = {};
        vibrate([10, 40, 30]);
        render();
        break;
      }
      const newCat = createCategory({
        name: f.name,
        type: f.type,
        color: f.color
      });
      if (state.pendingTx) {
        // Return to new-tx with the freshly created category selected
        state.modal = 'newTx';
        state.modalForm = { ...state.pendingTx, type: newCat.type, categoryId: newCat.id };
        state.pendingTx = null;
      } else {
        state.modal = null;
        state.modalForm = {};
      }
      vibrate([10, 40, 30]);
      render();
      break;
    }

    case 'edit-cat': {
      const cat = state.data.categories.find(c => c.id === id);
      if (!cat) return;
      state.modal = 'newCat';
      state.modalForm = {
        editingId: cat.id,
        name: cat.name,
        type: cat.type,
        color: cat.color
      };
      vibrate(10);
      render();
      break;
    }

    case 'archive-cat-confirmed': {
      archiveCategory(id);
      state.modal = null;
      state.modalCtx = null;
      vibrate([20, 30, 20]);
      render();
      break;
    }

    case 'unarchive-cat': {
      unarchiveCategory(id);
      vibrate([10, 30, 10]);
      render();
      break;
    }

    case 'export-csv':
      exportCsv();
      vibrate([10, 30, 10]);
      break;

    case 'export-backup':
      exportBackup();
      vibrate([10, 30, 10]);
      break;

    case 'import-backup-pick': {
      const input = document.getElementById('backup-file-input');
      if (input) {
        input.value = '';  // reset so same file can be re-picked
        input.click();
      }
      break;
    }

    case 'confirm-import-backup': {
      // Triggered after file selected — show confirmation
      const file = state.pendingImportFile;
      if (!file) return;
      state.modal = 'confirmImport';
      state.modalCtx = file;
      vibrate(10);
      render();
      break;
    }

    case 'do-import-backup': {
      const file = state.pendingImportFile;
      if (!file) return;
      state.modal = null;
      state.modalCtx = null;
      importBackup(file);
      state.pendingImportFile = null;
      break;
    }

    case 'dismiss-backup-reminder': {
      // Hide reminder for 24h
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      state.data.backupReminderHiddenUntil = tomorrow.toISOString();
      saveData();
      render();
      break;
    }

    case 'set-theme':
      state.data.theme = key;
      saveData();
      applyTheme();
      vibrate(8);
      render();
      break;

    case 'open-new-event':
      state.modal = 'newEvent';
      state.modalForm = { name: '', color: nextAutoColor() };
      vibrate(10);
      render();
      break;

    case 'edit-event': {
      const ev = state.data.events.find(e => e.id === id);
      if (!ev) return;
      state.modal = 'newEvent';
      state.modalForm = { editingId: ev.id, name: ev.name, color: ev.color };
      vibrate(10);
      render();
      break;
    }

    case 'save-event': {
      const f = state.modalForm;
      if (f.editingId) {
        updateEvent(f.editingId, { name: f.name, color: f.color });
      } else {
        createEvent({ name: f.name, color: f.color });
      }
      state.modal = null;
      state.modalForm = {};
      vibrate([10, 40, 30]);
      render();
      break;
    }

    case 'del-event': {
      const ev = state.data.events.find(e => e.id === id);
      if (!ev) return;
      if (eventHasTransactions(id)) {
        state.modal = 'confirmArchiveEvent';
        state.modalCtx = ev;
        vibrate(10);
        render();
        return;
      }
      state.modal = 'confirmDelEvent';
      state.modalCtx = ev;
      vibrate(10);
      render();
      break;
    }

    case 'do-del-event':
      deleteEvent(state.modalCtx.id);
      state.modal = null;
      state.modalCtx = null;
      vibrate([20, 30, 20]);
      render();
      break;

    case 'archive-event-confirmed':
      archiveEvent(id);
      state.modal = null;
      state.modalCtx = null;
      vibrate([20, 30, 20]);
      render();
      break;

    case 'unarchive-event':
      unarchiveEvent(id);
      vibrate([10, 30, 10]);
      render();
      break;

    case 'del-tx': {
      const tx = state.data.transactions.find(t => t.id === id);
      if (!tx) return;
      state.modal = 'confirmDelTx';
      state.modalCtx = tx;
      vibrate(10);
      render();
      break;
    }

    case 'del-acc': {
      const acc = state.data.accounts.find(a => a.id === id);
      if (!acc) return;
      if (accountHasTransactions(id)) {
        state.modal = 'infoBlocked';
        state.modalCtx = `Не можна видалити «${acc.name}» — на ньому є транзакції. Спочатку видали транзакції на вкладці «Список».`;
        render();
        return;
      }
      state.modal = 'confirmDelAcc';
      state.modalCtx = acc;
      vibrate(10);
      render();
      break;
    }

    case 'del-cat': {
      const cat = state.data.categories.find(c => c.id === id);
      if (!cat) return;
      if (categoryHasTransactions(id)) {
        state.modal = 'confirmArchiveCat';
        state.modalCtx = cat;
        vibrate(10);
        render();
        return;
      }
      state.modal = 'confirmDelCat';
      state.modalCtx = cat;
      vibrate(10);
      render();
      break;
    }

    case 'do-del-tx':
      deleteTransaction(state.modalCtx.id);
      state.modal = null;
      state.modalCtx = null;
      vibrate([20, 30, 20]);
      render();
      break;

    case 'do-del-acc':
      deleteAccount(state.modalCtx.id);
      state.modal = null;
      state.modalCtx = null;
      state.subView = null;
      vibrate([20, 30, 20]);
      render();
      break;

    case 'do-del-cat':
      deleteCategory(state.modalCtx.id);
      state.modal = null;
      state.modalCtx = null;
      vibrate([20, 30, 20]);
      render();
      break;

    /* ========== Stage 1 — attachments smoke-test ========== */

    case 'test-pick-camera': {
      const input = document.getElementById('test-photo-input');
      if (input) { input.value = ''; input.click(); }
      break;
    }

    case 'test-pick-gallery': {
      const input = document.getElementById('test-gallery-input');
      if (input) { input.value = ''; input.click(); }
      break;
    }

    case 'test-pick-file': {
      const input = document.getElementById('test-file-input');
      if (input) { input.value = ''; input.click(); }
      break;
    }

    case 'test-refresh-stats': {
      refreshTestData();
      vibrate(8);
      break;
    }

    case 'test-request-persist': {
      requestPersistence().then((res) => {
        state.testPersistent = res.supported ? res.persistent : false;
        vibrate(8);
        render();
      });
      break;
    }

    case 'test-view-file': {
      attDB.get(id).then((rec) => {
        if (!rec || !rec.blob) return;
        const url = URL.createObjectURL(rec.blob);
        // Open in a new tab. Browser handles preview (image, PDF) natively.
        window.open(url, '_blank');
        // Revoke after a delay so the new tab has time to load.
        setTimeout(() => URL.revokeObjectURL(url), 60000);
      });
      vibrate(8);
      break;
    }

    case 'test-delete-file': {
      attDB.remove(id).then(() => {
        state.testFiles = state.testFiles.filter(f => f.id !== id);
        vibrate([20, 30]);
        render();
      });
      break;
    }

    case 'test-clear-all': {
      attDB.clear().then(() => {
        state.testFiles = [];
        vibrate([20, 30, 20]);
        render();
      });
      break;
    }

    case 'close-modal':
      closeModalOrBack();
      render();
      break;
  }
}

/* ============================================================
   TEST helpers (Stage 1 only)
   ============================================================ */

async function refreshTestData() {
  try {
    const [files, quota] = await Promise.all([
      attDB.getAll(),
      storageEstimate()
    ]);
    state.testFiles = files.sort((a, b) => b.addedAt - a.addedAt);
    state.testQuota = quota;
    if (navigator.storage && navigator.storage.persisted) {
      state.testPersistent = await navigator.storage.persisted();
    }
    render();
  } catch (e) {
    console.error('refreshTestData failed', e);
  }
}

async function handleTestFilesPicked(files) {
  if (!files || !files.length) return;
  const MAX_SIZE = 20 * 1024 * 1024; // 20 MB per file
  state.testBusy = true;
  let added = 0;
  let skipped = 0;
  for (const file of files) {
    if (!file || file.size === 0) { skipped++; continue; }
    if (file.size > MAX_SIZE) { skipped++; continue; }
    try {
      await attDB.add(file, null);
      added++;
    } catch (e) {
      console.error('attDB.add failed', e);
      skipped++;
    }
  }
  state.testBusy = false;
  await refreshTestData();
  vibrate(added > 0 ? [20, 30, 20] : 30);
  if (skipped > 0) {
    console.warn(`Skipped ${skipped} file(s) — too large or empty.`);
  }
}

/* ============================================================
   INIT
   ============================================================ */

setupManifest();
setupServiceWorker();
applyTheme();
generateScheduledForRules();
render();
setupEvents();
setupSwipe();

// Stage 1 — open attachments DB and load file list so the test tab is populated.
// Errors are non-fatal: the rest of the app works without attachments.
attDB.open()
  .then(() => refreshTestData())
  .catch(err => console.warn('attDB init failed:', err));

// React to system theme changes if user is on 'system' mode
window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
  if ((state.data.theme || 'system') === 'system') {
    applyTheme();
  }
});
