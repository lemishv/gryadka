<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Спрея</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1c1c1c;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --text: #ededed;
    --text-dim: #888;
    --text-faint: #555;
    --amber: #d4a574;
    --amber-dim: rgba(212,165,116,0.10);
    --amber-fg: #1a1208;
    --teal: #8aa9ad;
    --stop-bg: #2a1818;
    --stop-fg: #e88c8c;
    --stop-border: rgba(184,92,92,0.4);
    --danger: #b85c5c;
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  [data-theme="light"] {
    --bg: #faf8f4;
    --surface: #ffffff;
    --surface-2: #f0ece4;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --text-dim: #6a6a6a;
    --text-faint: #a0a0a0;
    --amber: #a06a2a;
    --amber-dim: rgba(160,106,42,0.08);
    --amber-fg: #ffffff;
    --teal: #4d7a7d;
    --stop-bg: #fbe5e5;
    --stop-fg: #a04040;
    --stop-border: rgba(160,64,64,0.4);
    --danger: #a04040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  body {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 16px 80px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    gap: 8px;
  }
  .title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 28px;
    letter-spacing: -0.02em;
    color: var(--amber);
  }
  .header-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .theme-btn {
    background: none;
    border: 1px solid var(--border-strong);
    color: var(--text-dim);
    width: 32px;
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .theme-btn:active { color: var(--amber); border-color: var(--amber); }

  .lang-toggle {
    display: flex;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    overflow: hidden;
  }
  .lang-toggle button {
    background: none;
    border: none;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 6px 10px;
    cursor: pointer;
  }
  .lang-toggle button.active {
    background: var(--amber);
    color: var(--amber-fg);
  }

  section { margin-bottom: 32px; }
  h2 {
    font-family: var(--mono);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  .speed-display {
    display: flex;
    align-items: center;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin: 24px 0;
    overflow: hidden;
  }
  .speed-manual-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 12px;
    border-right: 1px solid var(--border);
    gap: 6px;
  }
  .speed-manual-col input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--teal);
    color: var(--teal);
    font-family: var(--mono);
    font-size: 20px;
    padding: 10px 8px;
    border-radius: 6px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    -moz-appearance: textfield;
  }
  .speed-manual-col input::-webkit-outer-spin-button,
  .speed-manual-col input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .speed-manual-col input:focus { outline: none; border-color: var(--teal); }
  .speed-manual-col .speed-manual-unit {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--teal);
  }
  .speed-collected {
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .speed-result-col {
    flex: 2;
    text-align: center;
    padding: 20px 12px;
  }
  .speed-display .num {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 64px;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--amber);
    font-variant-numeric: tabular-nums;
  }
  .speed-display .num.zero { color: var(--text-faint); }
  .speed-display .unit {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 8px;
  }
  .speed-display .secondary {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 8px;
    font-variant-numeric: tabular-nums;
  }

  .timer-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .timer-display {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 48px;
    line-height: 1;
    text-align: center;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
  }
  .timer-display.idle { color: var(--text-faint); }
  .timer-display.running { color: var(--amber); }

  .lap-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
    padding: 7px 14px;
    background: var(--surface-2);
    border-radius: 6px;
  }
  .lap-display-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .lap-display-time {
    font-family: var(--mono);
    font-size: 22px;
    color: var(--teal);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn:active { filter: brightness(0.92); }
  .btn-primary {
    background: var(--amber);
    color: var(--amber-fg);
    border-color: var(--amber);
    font-weight: 600;
  }
  .btn-stop {
    background: var(--stop-bg);
    color: var(--stop-fg);
    border-color: var(--stop-border);
  }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-row .btn { flex: 1; }
  .btn-secondary {
    background: transparent;
    border-color: var(--border);
    color: var(--text-dim);
    font-size: 12px;
    padding: 12px;
    letter-spacing: 0.08em;
  }

  .streams {
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px dashed var(--border);
  }
  .streams-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 12px;
  }
  .stream-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
  .stream-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
  }
  .stream-num {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .stream-delta-inline {
    flex: 1;
    text-align: right;
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .stream-delta-inline strong {
    color: var(--amber);
    font-weight: 500;
  }
  .remove-stream {
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 16px;
    cursor: pointer;
    width: 24px;
    height: 24px;
    border-radius: 4px;
    line-height: 1;
  }
  .remove-stream:active { color: var(--danger); }

  .stream-pair {
    display: grid;
    grid-template-columns: 1fr 16px 1fr;
    gap: 6px;
    align-items: end;
  }
  .stream-pair .arrow {
    text-align: center;
    color: var(--text-faint);
    font-size: 14px;
    padding-bottom: 12px;
  }
  .stream-field { display: flex; flex-direction: column; gap: 4px; }
  .stream-field-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding-left: 2px;
  }
  .stream-field input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px;
    padding: 10px 8px;
    border-radius: 6px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    -moz-appearance: textfield;
    min-width: 0;
  }
  .stream-field input::-webkit-outer-spin-button,
  .stream-field input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .stream-field input:focus { outline: none; border-color: var(--amber); }

  .stream-presets {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .preset-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 9px;
    border-radius: 4px;
    cursor: pointer;
    flex: 1;
    min-width: 0;
  }
  .preset-btn:active { color: var(--amber); border-color: var(--amber); }

  .add-stream-btn {
    background: none;
    border: 1px dashed var(--border-strong);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
  }
  .add-stream-btn:active { color: var(--amber); border-color: var(--amber); }
  .add-stream-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .stream-total {
    margin-top: 14px;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
  }
  .stream-total .label { color: var(--text-dim); }
  .stream-total .value {
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .manual-block {
    margin-top: 16px;
    padding: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .manual-block label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 8px;
  }
  .manual-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .manual-block input {
    flex: 1;
    min-width: 0;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px;
    padding: 10px 12px;
    border-radius: 6px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    -moz-appearance: textfield;
  }
  .manual-block input::-webkit-outer-spin-button,
  .manual-block input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .manual-block input:focus { outline: none; border-color: var(--amber); }
  .manual-block .unit-tag {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .prep-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .prep-card.active {
    border-color: var(--amber);
    background: linear-gradient(180deg, var(--surface) 0%, var(--amber-dim) 100%);
  }
  .prep-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .prep-checkbox {
    width: 22px;
    height: 22px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .prep-checkbox.checked {
    background: var(--amber);
    border-color: var(--amber);
  }
  .prep-checkbox.checked::after {
    content: '';
    width: 6px;
    height: 10px;
    border: solid var(--amber-fg);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .prep-name {
    flex: 1;
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .prep-actions { display: flex; gap: 4px; }
  .prep-action-btn {
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 14px;
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 4px;
  }
  .prep-action-btn:active { color: var(--amber); }
  .prep-action-btn.del:active { color: var(--danger); }

  .prep-norm {
    font-size: 13px;
    color: var(--text-dim);
    margin-left: 32px;
    font-variant-numeric: tabular-nums;
  }
  .prep-output {
    margin-top: 10px;
    margin-left: 32px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  .po-main {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .po-main .arrow { color: var(--text-faint); font-size: 13px; }
  .po-main .ml-min {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--amber);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .po-main .ml-min.dimmed { color: var(--text-faint); }
  .po-main .ml-unit {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .po-runtime {
    display: flex;
    align-items: baseline;
    gap: 6px;
    font-size: 13px;
    color: var(--teal);
    font-variant-numeric: tabular-nums;
  }
  .po-runtime.dimmed { color: var(--text-faint); }
  .po-runtime .rt-label {
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .prep-reverse {
    margin-top: 10px;
    margin-left: 32px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .prep-reverse input {
    width: 80px;
    background: var(--bg);
    border: 1px solid var(--teal);
    color: var(--teal);
    font-family: var(--mono);
    font-size: 14px;
    padding: 6px 8px;
    border-radius: 5px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    -moz-appearance: textfield;
  }
  .prep-reverse input::-webkit-outer-spin-button,
  .prep-reverse input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .prep-reverse input:focus { outline: none; border-color: var(--teal); }
  .prep-reverse .rev-unit {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .prep-reverse .rev-arrow { color: var(--text-faint); font-size: 13px; }
  .prep-reverse .rev-result {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--teal);
    font-variant-numeric: tabular-nums;
  }
  .prep-reverse .rev-result-unit {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .prep-edit input {
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 6px;
  }
  .prep-edit input:focus { outline: none; border-color: var(--amber); }
  .prep-edit .field-row { display: flex; align-items: center; gap: 8px; }
  .prep-edit label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    width: 70px;
    flex-shrink: 0;
  }
  .prep-edit .field-row input { flex: 1; min-width: 0; text-align: right; font-variant-numeric: tabular-nums; }
  .prep-edit .field-row .unit-tag { font-size: 12px; color: var(--text-dim); width: 36px; flex-shrink: 0; }
  .prep-edit .edit-actions { display: flex; gap: 8px; margin-top: 4px; }
  .prep-edit .edit-actions .btn { padding: 10px; font-size: 12px; }

  .add-prep-btn {
    background: none;
    border: 1px dashed var(--border-strong);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 13px;
    padding: 14px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
  }
  .add-prep-btn:active { color: var(--amber); border-color: var(--amber); }

  footer {
    text-align: center;
    color: var(--text-faint);
    font-size: 11px;
    letter-spacing: 0.1em;
    padding-top: 32px;
  }

  .hidden { display: none !important; }

  /* Session entry button on home */
  .session-entry {
    display: block;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.08em;
    padding: 14px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 24px;
  }
  .session-entry:active { filter: brightness(0.92); }
  .session-entry.active {
    background: linear-gradient(180deg, var(--surface) 0%, var(--amber-dim) 100%);
    border-color: var(--amber);
    color: var(--amber);
  }
  .session-entry.active .se-status {
    color: var(--amber);
    font-weight: 600;
  }
  .session-entry .se-meta {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Session view */
  .session-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 8px;
  }
  .session-back {
    background: none;
    border: 1px solid var(--border-strong);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
  }
  .session-back:active { color: var(--amber); border-color: var(--amber); }
  .session-title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--amber);
    flex: 1;
    text-align: center;
  }

  /* Pre-start form */
  .session-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .form-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    padding: 10px 12px;
    border-radius: 6px;
  }
  .form-input:focus { outline: none; border-color: var(--amber); }
  .variety-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .variety-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 9px;
    border-radius: 4px;
    cursor: pointer;
  }
  .variety-chip:active { color: var(--amber); border-color: var(--amber); }

  /* Container types list */
  .ctype-row {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .ctype-menu-btn {
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    padding: 0;
    margin-right: -4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctype-menu-btn:active { color: var(--amber); background: var(--surface-2); }
  .ctype-info {
    flex: 1;
    min-width: 0;
  }
  .ctype-size {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--teal);
    margin-bottom: 2px;
  }
  .ctype-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .ctype-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .ctype-count {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--amber);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    min-width: 36px;
    text-align: right;
  }
  .ctype-add-btn {
    background: var(--amber);
    color: var(--amber-fg);
    border: none;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    min-width: 56px;
  }
  .ctype-add-btn:active { filter: brightness(0.92); }
  .ctype-remove {
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 16px;
    cursor: pointer;
    width: 28px;
    height: 28px;
  }
  .ctype-remove:active { color: var(--danger); }

  .add-ctype-form {
    background: var(--surface-2);
    border: 1px dashed var(--border-strong);
    border-radius: 8px;
    padding: 12px;
    margin-top: 8px;
  }
  .add-ctype-form .field-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 8px;
  }
  .add-ctype-form .field-row label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    width: 56px;
    flex-shrink: 0;
  }
  .add-ctype-form .field-row input {
    flex: 1;
    min-width: 0;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 8px 10px;
    border-radius: 4px;
  }
  .add-ctype-form .field-row input:focus { outline: none; border-color: var(--amber); }
  .add-ctype-form .presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
    margin-bottom: 8px;
    margin-left: 62px;
  }
  .add-ctype-form .actions {
    display: flex;
    gap: 6px;
  }

  /* Active session timer */
  .session-timer-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 16px 18px;
    text-align: center;
    margin-bottom: 14px;
  }
  .session-timer-block.paused {
    background: var(--surface-2);
    border-color: var(--stop-border);
  }
  .session-timer {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 44px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--amber);
    font-variant-numeric: tabular-nums;
  }
  .session-timer.paused-text {
    color: var(--stop-fg);
  }
  .session-paused-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--stop-fg);
    margin-top: 8px;
  }
  .session-tonnage {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 12px;
    letter-spacing: 0.1em;
  }
  .session-tonnage strong {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .session-pause-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 14px;
  }
  .session-pause-btn:active { color: var(--amber); border-color: var(--amber); }

  /* Prep cards in session */
  .session-prep-card {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .session-prep-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }
  .session-prep-name {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
  }
  .session-prep-volume {
    font-family: var(--serif);
    font-size: 18px;
    color: var(--amber);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .session-prep-actual {
    font-size: 11px;
    color: var(--teal);
    margin-bottom: 10px;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
  }
  .session-prep-actual.dimmed { color: var(--text-faint); }
  .session-prep-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .session-prep-meta {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  /* Log */
  .session-log {
    margin-top: 8px;
  }
  .log-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .log-toggle:active { color: var(--amber); border-color: var(--amber); }
  .log-list {
    margin-top: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 280px;
    overflow-y: auto;
  }
  .log-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .log-item:last-child { border-bottom: none; }
  .log-time {
    font-family: var(--mono);
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    width: 56px;
    flex-shrink: 0;
  }
  .log-desc {
    flex: 1;
    color: var(--text);
    min-width: 0;
  }
  .log-remove {
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 14px;
    cursor: pointer;
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }
  .log-remove:active { color: var(--danger); }
  .log-empty {
    padding: 16px;
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
  }

  /* End/start session button */
  .session-major-btn {
    width: 100%;
    padding: 16px;
    background: var(--amber);
    color: var(--amber-fg);
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 24px;
  }
  .session-major-btn:active { filter: brightness(0.92); }
  .session-major-btn.danger {
    background: var(--stop-bg);
    color: var(--stop-fg);
    border: 1px solid var(--stop-border);
  }

  /* Prep selection chips for pre-start */
  .prep-select-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .prep-select-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
  }
  .prep-select-row.selected {
    border-color: var(--amber);
    background: var(--amber-dim);
  }
  .prep-select-row .pscb {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .prep-select-row.selected .pscb {
    background: var(--amber);
    border-color: var(--amber);
  }
  .prep-select-row.selected .pscb::after {
    content: '';
    width: 6px; height: 10px;
    border: solid var(--amber-fg);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .prep-select-name {
    font-family: var(--serif);
    font-size: 16px;
    flex: 1;
  }
  .prep-select-meta {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  /* Completion summary */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--amber);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 14px;
  }
  .summary-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    color: var(--amber);
    margin-bottom: 4px;
  }
  .summary-subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 18px;
    letter-spacing: 0.05em;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px dashed var(--border);
    gap: 12px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-key {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .summary-val {
    font-family: var(--serif);
    font-size: 17px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .summary-val.highlight { color: var(--amber); font-weight: 600; }
  .summary-section {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .summary-section-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  /* Inline edit forms for session tiles */
  .inline-edit {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 6px;
  }
  .inline-edit .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .inline-edit label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    width: 70px;
    flex-shrink: 0;
  }
  .inline-edit input {
    flex: 1;
    min-width: 0;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 8px 10px;
    border-radius: 4px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .inline-edit input[type="text"] { text-align: left; }
  .inline-edit input:focus { outline: none; border-color: var(--amber); }
  .inline-edit .unit-tag {
    font-size: 12px;
    color: var(--text-dim);
    width: 40px;
    flex-shrink: 0;
  }
  .inline-edit .actions {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .inline-edit .actions .btn {
    padding: 10px;
    font-size: 12px;
  }
  .inline-edit .delete-btn {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--stop-border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 10px;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
  }
  .inline-edit .delete-btn.armed {
    background: var(--stop-bg);
    color: var(--stop-fg);
    border-color: var(--stop-fg);
    font-weight: 600;
  }

  /* Two-stage confirm buttons */
  .confirm-btn {
    transition: background 120ms;
  }
  .confirm-btn.armed {
    background: var(--stop-bg) !important;
    color: var(--stop-fg) !important;
    border-color: var(--stop-fg) !important;
  }
  [data-theme="light"] .confirm-btn.armed {
    background: var(--stop-bg) !important;
    color: var(--stop-fg) !important;
  }

  /* Session controls below */
  .session-controls {
    display: flex;
    gap: 8px;
    margin-top: 24px;
  }
  .session-delete-btn {
    flex: 0 0 auto;
    padding: 16px;
    background: transparent;
    color: var(--text-faint);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    cursor: pointer;
  }
  .session-delete-btn.armed {
    color: var(--danger);
    border-color: var(--danger);
    background: var(--stop-bg);
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-y: auto;
    padding: 20px;
  }
  [data-theme="light"] .modal-backdrop {
    background: rgba(0, 0, 0, 0.4);
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    width: 100%;
    max-width: 460px;
    margin: auto;
    padding: 20px;
    box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.5);
    max-height: calc(100vh - 40px);
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 10px;
  }
  .modal-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    color: var(--amber);
    letter-spacing: -0.01em;
    flex: 1;
    min-width: 0;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 22px;
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    line-height: 1;
    padding: 0;
    flex-shrink: 0;
  }
  .modal-close:active { color: var(--amber); background: var(--surface-2); }
  .modal-section {
    margin-bottom: 16px;
  }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 8px;
  }
  .modal-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px;
    padding: 10px 12px;
    border-radius: 6px;
    font-variant-numeric: tabular-nums;
    -moz-appearance: textfield;
  }
  .modal-input::-webkit-outer-spin-button,
  .modal-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .modal-input:focus { outline: none; border-color: var(--amber); }
  .modal-input.text-right { text-align: right; }
  .modal-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .modal-row .modal-input { flex: 1; min-width: 0; }
  .modal-row .unit-tag {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .modal-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.4;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .modal-actions .btn { flex: 1; padding: 14px; }

  /* Chip selectors */
  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 12px;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    position: relative;
  }
  .chip.selected {
    background: var(--amber);
    color: var(--amber-fg);
    border-color: var(--amber);
  }
  .chip:active { filter: brightness(0.92); }
  .chip-add {
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: var(--text-faint);
  }
  .chip-remove {
    display: inline-block;
    margin-left: 5px;
    font-size: 11px;
    opacity: 0.5;
    line-height: 1;
    vertical-align: middle;
  }
  .chip-remove:active { opacity: 1; color: var(--danger); }

  /* Delete button in modal */
  .modal-delete-btn {
    width: 100%;
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--stop-border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 12px;
    cursor: pointer;
    margin-top: 16px;
  }
  .modal-delete-btn.armed {
    background: var(--stop-bg);
    color: var(--stop-fg);
    border-color: var(--stop-fg);
    font-weight: 600;
  }

  /* History list */
  .history-row {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .history-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .history-num {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--amber);
  }
  .history-date {
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .history-meta {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .history-meta strong { color: var(--text); font-weight: 500; }
  .history-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .history-actions button {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 8px;
    border-radius: 4px;
    cursor: pointer;
  }
  .history-actions button:active { color: var(--amber); border-color: var(--amber); }
  .history-actions button.del:active { color: var(--danger); border-color: var(--danger); }
  .history-actions button.armed { color: var(--danger); border-color: var(--danger); background: var(--stop-bg); }

  /* Counter (− N +) */
  .counter-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    overflow: hidden;
  }
  .counter-btn {
    background: var(--bg);
    border: none;
    color: var(--amber);
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    width: 56px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .counter-btn:active { background: var(--surface-2); }
  .counter-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .counter-value {
    flex: 1;
    background: var(--bg);
    border: none;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    color: var(--text);
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    text-align: center;
    font-variant-numeric: tabular-nums;
    padding: 8px;
    min-width: 0;
    -moz-appearance: textfield;
  }
  .counter-value::-webkit-outer-spin-button,
  .counter-value::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .counter-value:focus { outline: none; }

  .summary-line {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    text-align: center;
    font-family: var(--mono);
    font-size: 13px;

    font-variant-numeric: tabular-nums;

  }
  .summary-line strong {
    color: var(--amber);
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 600;
  }
</style>
</head>

var STORAGE_KEY = 'spreya:v1';
var PRESETS = [1000, 1100, 1250];

var state = {
  lang: 'uk',
  theme: 'dark',
  manualSpeed: 0,
  preparations: [
    { id: 1, name: 'MAXIM', norm: 250, canVolume: 5, active: true }
  ],
  timer: { running: false, startMs: null, elapsedMs: 0, frozenElapsedMs: 0, lastLapMs: 0 },
  streams: [],
  editingPrepId: null,
  view: 'main',
  session: null,
  sessions: [],
  varieties: [],
  containerKinds: ['ящик', 'мішок'],
  sizes: ['крупна', 'середня', 'дрібна'],
  modal: null
};

var timerInterval = null;

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data.lang) state.lang = data.lang;
    if (data.theme === 'light' || data.theme === 'dark') state.theme = data.theme;
    if (typeof data.manualSpeed === 'number') state.manualSpeed = data.manualSpeed;
    if (Array.isArray(data.preparations)) {
      state.preparations = data.preparations.map(function(p) {
        if (p.canVolume == null) p.canVolume = 5;
        return p;
      });
    }
    if (data.session) {
      state.session = data.session;
      // Migrate container types: add kind/size if missing
      if (state.session.containerTypes) {
        state.session.containerTypes.forEach(function(t) {
          if (!t.kind) t.kind = 'ящик';
          if (t.size === undefined) t.size = '';
        });
      }
    }
    if (Array.isArray(data.sessions)) {
      state.sessions = data.sessions.map(function(s) {
        if (s.containerTypes) {
          s.containerTypes.forEach(function(t) {
            if (!t.kind) t.kind = 'ящик';
            if (t.size === undefined) t.size = '';
          });
        }
        return s;
      });
    }
    if (Array.isArray(data.varieties)) state.varieties = data.varieties;
    if (Array.isArray(data.containerKinds) && data.containerKinds.length > 0) state.containerKinds = data.containerKinds;
    // Permanent kinds are always available
    PERMANENT_KINDS.forEach(function(k) {
      if (state.containerKinds.indexOf(k) === -1) state.containerKinds.push(k);
    });
    if (Array.isArray(data.sizes) && data.sizes.length > 0) state.sizes = data.sizes;
    if (data.timer && typeof data.timer === 'object') {
      state.timer.running = !!data.timer.running;
      state.timer.startMs = (typeof data.timer.startMs === 'number') ? data.timer.startMs : null;
      state.timer.elapsedMs = (typeof data.timer.elapsedMs === 'number') ? data.timer.elapsedMs : 0;
      state.timer.frozenElapsedMs = (typeof data.timer.frozenElapsedMs === 'number') ? data.timer.frozenElapsedMs : 0;
      state.timer.lastLapMs = (typeof data.timer.lastLapMs === 'number') ? data.timer.lastLapMs : 0;
      // If timer was running when app was closed/killed, recompute elapsed from wall-clock.
      if (state.timer.running && state.timer.startMs) {
        state.timer.elapsedMs = Date.now() - state.timer.startMs;
      }
    }
  } catch (e) { console.warn('load failed', e); }
}

function saveState() {
  var data = {
    lang: state.lang,
    theme: state.theme,
    manualSpeed: state.manualSpeed,
    preparations: state.preparations,
    session: state.session,
    sessions: state.sessions,
    varieties: state.varieties,
    containerKinds: state.containerKinds,
    sizes: state.sizes,
    timer: state.timer
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  var meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', state.theme === 'light' ? '#faf8f4' : '#0a0a0a');
  var btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = state.theme === 'dark' ? '☀' : '☾';
}

function tr(key) { return T[state.lang][key] || key; }

function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

function fmtNum(n, decimals) {
  if (decimals == null) decimals = 0;
  if (!isFinite(n)) return '—';
  var fixed = n.toFixed(decimals);
  var parts = fixed.split('.');
  var intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  return parts.length > 1 ? intPart + ',' + parts[1] : intPart;
}

function fmtMinutesAsHM(minutes) {
  if (!isFinite(minutes) || minutes <= 0) return '—';
  if (minutes < 60) return Math.round(minutes) + ' ' + tr('minShort');
  var h = Math.floor(minutes / 60);
  var m = Math.round(minutes - h * 60);
  if (m === 0) return h + ' ' + tr('hourShort');
  return h + ' ' + tr('hourShort') + ' ' + m + ' ' + tr('minShort');
}

function fmtTime(ms) {
  var totalSec = Math.floor(ms / 1000);
  var h = Math.floor(totalSec / 3600);
  var m = Math.floor((totalSec % 3600) / 60);
  var s = totalSec % 60;
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

function streamDelta(stream) {
  if (stream.after === '' || stream.after == null) return 0;
  var after = Number(stream.after);
  var before = Number(stream.before) || 0;
  if (!isFinite(after)) return 0;
  var delta = after - before;
  return delta > 0 ? delta : 0;
}

function streamsTotal() {
  var sum = 0;
  for (var i = 0; i < state.streams.length; i++) sum += streamDelta(state.streams[i]);
  return sum;
}

function calculatedSpeed() {
  var total = streamsTotal();
  var minutes = state.timer.frozenElapsedMs / 60000;
  if (total <= 0 || minutes <= 0) return null;
  return total / minutes;
}

function currentSpeed() {
  var calc = calculatedSpeed();
  if (calc !== null) return calc;
  return state.manualSpeed || 0;
}

function renderI18n() {
  document.documentElement.lang = state.lang;
  document.title = tr('title');
  var els = document.querySelectorAll('[data-i18n]');
  for (var i = 0; i < els.length; i++) {
    var key = els[i].getAttribute('data-i18n');
    if (T[state.lang][key]) els[i].textContent = T[state.lang][key];
  }
  var langBtns = document.querySelectorAll('#langToggle button');
  for (var j = 0; j < langBtns.length; j++) {
    langBtns[j].classList.toggle('active', langBtns[j].getAttribute('data-lang') === state.lang);
  }
}

function renderTimer() {
  var display = document.getElementById('timerDisplay');
  var lapEl = document.getElementById('lapDisplay');
  var lapTimeEl = document.getElementById('lapTime');
  var btn = document.getElementById('timerBtn');
  var reset = document.getElementById('resetBtn');

  display.textContent = fmtTime(state.timer.elapsedMs);

  // Малий дисплей — показуємо тільки коли є зафіксований лап
  if (state.timer.frozenElapsedMs > 0 && lapEl && lapTimeEl) {
    lapEl.classList.remove('hidden');
    lapTimeEl.textContent = fmtTime(state.timer.frozenElapsedMs);
  } else if (lapEl) {
    lapEl.classList.add('hidden');
  }

  if (state.timer.running) {
    display.className = 'timer-display running';
    btn.textContent = tr('lap');
    btn.className = 'btn btn-stop';
    reset.classList.remove('hidden');
  } else {
    display.className = state.timer.elapsedMs > 0 ? 'timer-display' : 'timer-display idle';
    btn.textContent = tr('start');
    btn.className = 'btn btn-primary';
    reset.classList.toggle('hidden', state.timer.elapsedMs === 0 && state.timer.frozenElapsedMs === 0);
  }
}

function refreshAllStreamDeltas() {
  var total = streamsTotal();
  var blocks = document.querySelectorAll('#streamsList .stream-block');
  var multi = state.streams.length > 1;
  state.streams.forEach(function(stream, idx) {
    if (!blocks[idx]) return;
    var deltaEl = blocks[idx].querySelector('[data-role="delta"]');
    if (!deltaEl) return;
    var d = streamDelta(stream);
    if (d > 0) {
      var content = 'Δ <strong>' + fmtNum(d) + '</strong> ' + tr('kg');
      if (multi && total > 0) {
        content += ' · ' + fmtNum(d / total * 100, 0) + '%';
      }
      deltaEl.innerHTML = content;
    } else {
      deltaEl.innerHTML = '';
    }
  });
}

function renderStreams() {
  var list = document.getElementById('streamsList');
  list.innerHTML = '';

  if (state.streams.length === 0) {
    state.streams.push({ id: Date.now(), before: '', after: '' });
  }

  state.streams.forEach(function(stream, idx) {
    var block = document.createElement('div');
    block.className = 'stream-block';
    var showRemove = state.streams.length > 1;

    var html = '';
    html += '<div class="stream-head">';
    html += '<div class="stream-num">№' + (idx + 1) + '</div>';
    html += '<div class="stream-delta-inline" data-role="delta"></div>';
    if (showRemove) html += '<button class="remove-stream" data-role="remove">✕</button>';
    html += '</div>';
    html += '<div class="stream-pair">';
    html += '<div class="stream-field">';
    html += '<div class="stream-field-label">' + tr('before') + '</div>';
    html += '<input type="number" inputmode="decimal" data-role="before" value="' + escapeHtml(String(stream.before)) + '" placeholder="0">';
    html += '</div>';
    html += '<div class="arrow">→</div>';
    html += '<div class="stream-field">';
    html += '<div class="stream-field-label">' + tr('after') + '</div>';
    html += '<input type="number" inputmode="decimal" data-role="after" value="' + escapeHtml(String(stream.after)) + '" placeholder="0">';
    html += '</div>';
    html += '</div>';
    html += '<div class="stream-presets" data-role="presets"></div>';
    block.innerHTML = html;

    var beforeInput = block.querySelector('[data-role="before"]');
    var afterInput = block.querySelector('[data-role="after"]');
    var presetsEl = block.querySelector('[data-role="presets"]');
    var deltaEl = block.querySelector('[data-role="delta"]');

    beforeInput.addEventListener('input', function(e) {
      stream.before = e.target.value === '' ? '' : Number(e.target.value);
      refreshAllStreamDeltas();
      updateSpeedDisplay();
      updateStreamTotal();
    });
    afterInput.addEventListener('input', function(e) {
      stream.after = e.target.value === '' ? '' : Number(e.target.value);
      refreshAllStreamDeltas();
      updateSpeedDisplay();
      updateStreamTotal();
    });

    if (showRemove) {
      block.querySelector('[data-role="remove"]').addEventListener('click', function() {
        state.streams = state.streams.filter(function(s) { return s.id !== stream.id; });
        if (state.streams.length === 0) state.streams.push({ id: Date.now(), before: '', after: '' });
        renderStreams();
        updateSpeedDisplay();
        updateStreamTotal();
      });
    }

    PRESETS.forEach(function(p) {
      var b = document.createElement('button');
      b.className = 'preset-btn';
      b.textContent = p;
      b.addEventListener('click', function() {
        stream.after = p;
        afterInput.value = p;
        refreshAllStreamDeltas();
        updateSpeedDisplay();
        updateStreamTotal();
      });
      presetsEl.appendChild(b);
    });

    list.appendChild(block);
  });

  refreshAllStreamDeltas();
  document.getElementById('addStreamBtn').disabled = state.streams.length >= 3;
  updateStreamTotal();
}

function updateStreamTotal() {
  document.getElementById('streamTotal').textContent = fmtNum(streamsTotal());
}

function updateSpeedDisplay() {
  var speed = currentSpeed();
  var numEl = document.getElementById('speedNum');
  var hourEl = document.getElementById('speedHour');
  if (speed > 0) {
    numEl.className = 'num';
    numEl.textContent = fmtNum(speed, speed < 100 ? 1 : 0);
    hourEl.textContent = fmtNum(speed * 60);
  } else {
    numEl.className = 'num zero';
    numEl.textContent = '0';
    hourEl.textContent = '0';
  }
  renderPreparations();
}

function renderManualInput() {
  var hidden = document.getElementById('manualSpeed');
  var vis = document.getElementById('manualSpeedVis');
  if (state.manualSpeed > 0) {
    if (hidden) hidden.value = state.manualSpeed;
    if (vis && document.activeElement !== vis) vis.value = state.manualSpeed;
  } else {
    if (vis && document.activeElement !== vis) vis.value = '';
  }
}

function renderPreparations() {
  var list = document.getElementById('prepList');
  // Якщо кнопка видалення вже "зведена" — не перестворювати картки,
  // щоб не скидати стан підтвердження.
  if (list.querySelector('.prep-action-btn.armed')) {
    // Тільки оновлюємо числа в існуючих картках
    var speed = currentSpeed();
    list.querySelectorAll('.prep-card').forEach(function(card, idx) {
      var prep = state.preparations[idx];
      if (!prep) return;
      var mlMin = (speed > 0 && prep.active) ? speed * prep.norm / 1000 : null;
      var mlEl = card.querySelector('.ml-min');
      if (mlEl) mlEl.textContent = mlMin !== null ? fmtNum(mlMin, mlMin < 100 ? 1 : 0) : '—';
    });
    return;
  }
  list.innerHTML = '';
  var speed = currentSpeed();

  state.preparations.forEach(function(prep) {
    var card = document.createElement('div');
    card.className = 'prep-card' + (prep.active ? ' active' : '');

    if (state.editingPrepId === prep.id) {
      var editHtml = '';
      editHtml += '<div class="prep-edit">';
      editHtml += '<div class="field-row">';
      editHtml += '<label>' + tr('name') + '</label>';
      editHtml += '<input type="text" data-role="editName" value="' + escapeHtml(prep.name) + '" placeholder="' + escapeHtml(tr('namePlaceholder')) + '">';
      editHtml += '</div>';
      editHtml += '<div class="field-row">';
      editHtml += '<label>' + tr('norm') + '</label>';
      editHtml += '<input type="number" inputmode="decimal" data-role="editNorm" value="' + prep.norm + '">';
      editHtml += '<span class="unit-tag">' + tr('mlPerTon') + '</span>';
      editHtml += '</div>';
      editHtml += '<div class="field-row">';
      editHtml += '<label>' + tr('canVolume') + '</label>';
      editHtml += '<input type="number" inputmode="decimal" data-role="editCan" value="' + (prep.canVolume || 5) + '">';
      editHtml += '<span class="unit-tag">' + tr('liter') + '</span>';
      editHtml += '</div>';
      editHtml += '<div class="edit-actions">';
      editHtml += '<button class="btn btn-secondary" data-action="cancel">' + tr('cancelBtn') + '</button>';
      editHtml += '<button class="btn btn-primary" data-action="save">' + tr('saveBtn') + '</button>';
      editHtml += '</div>';
      editHtml += '</div>';
      card.innerHTML = editHtml;

      card.querySelector('[data-action="cancel"]').addEventListener('click', function() {
        if (!prep.name) {
          state.preparations = state.preparations.filter(function(p) { return p.id !== prep.id; });
        }
        state.editingPrepId = null;
        renderPreparations();
      });
      card.querySelector('[data-action="save"]').addEventListener('click', function() {
        var nameEl = card.querySelector('[data-role="editName"]');
        var normEl = card.querySelector('[data-role="editNorm"]');
        var canEl = card.querySelector('[data-role="editCan"]');
        var newName = nameEl.value.trim();
        var newNorm = Number(normEl.value);
        var newCan = Number(canEl.value);
        if (!newName) { nameEl.focus(); return; }
        if (!isFinite(newNorm) || newNorm <= 0) { normEl.focus(); return; }
        if (!isFinite(newCan) || newCan <= 0) { canEl.focus(); return; }
        prep.name = newName;
        prep.norm = newNorm;
        prep.canVolume = newCan;
        state.editingPrepId = null;
        saveState();
        renderPreparations();
      });
    } else {
      var mlMin = (speed > 0 && prep.active) ? speed * prep.norm / 1000 : null;
      var dimmed = mlMin === null ? 'dimmed' : '';
      var mlText = mlMin !== null ? fmtNum(mlMin, mlMin < 100 ? 1 : 0) : '—';

      var dispHtml = '';
      dispHtml += '<div class="prep-head">';
      dispHtml += '<div class="prep-checkbox ' + (prep.active ? 'checked' : '') + '" data-action="toggle"></div>';
      dispHtml += '<div class="prep-name">' + escapeHtml(prep.name) + '<span style="font-family:var(--mono);font-size:12px;font-weight:400;color:var(--text-dim);margin-left:8px;letter-spacing:0;">' + fmtNum(prep.norm, 0) + ' ' + tr('mlPerTon') + '</span></div>';
      dispHtml += '<div class="prep-actions">';
      dispHtml += '<button class="prep-action-btn" data-action="edit">✎</button>';
      dispHtml += '<button class="prep-action-btn del" data-action="delete">✕</button>';
      dispHtml += '</div>';
      dispHtml += '</div>';
      var minPerLiter = (mlMin && mlMin > 0) ? 1000 / mlMin : null;
      var rtText = minPerLiter !== null ? fmtMinutesAsHM(minPerLiter) : '—';
      var rtDimmed = minPerLiter === null ? 'dimmed' : '';
      dispHtml += '<div class="prep-output">';
      dispHtml += '<div class="po-main">';
      dispHtml += '<span class="arrow">→</span>';
      dispHtml += '<span class="ml-min ' + dimmed + '">' + mlText + '</span>';
      dispHtml += '<span class="ml-unit">' + tr('mlPerMin') + '</span>';
      dispHtml += '</div>';
      dispHtml += '<div class="po-runtime ' + rtDimmed + '">';
      dispHtml += '<span class="rt-label">' + tr('perLiterLabel') + '</span>';
      dispHtml += '<span>' + rtText + '</span>';
      dispHtml += '</div>';
      dispHtml += '</div>';
      dispHtml += '<div class="prep-reverse">';
      dispHtml += '<input type="number" inputmode="decimal" placeholder="0" data-role="revMl" data-prep-id="' + prep.id + '">';
      dispHtml += '<span class="rev-unit">' + tr('mlPerMin') + '</span>';
      dispHtml += '<span class="rev-arrow">→</span>';
      dispHtml += '<span class="rev-result" data-role="revResult">—</span>';
      dispHtml += '<span class="rev-result-unit">' + tr('kgPerHour') + '</span>';
      dispHtml += '</div>';
      card.innerHTML = dispHtml;

      card.querySelector('[data-role="revMl"]').addEventListener('input', function(e) {
        var ml = Number(e.target.value) || 0;
        var resultEl = card.querySelector('[data-role="revResult"]');
        if (ml > 0 && prep.norm > 0) {
          var kgPerMin = ml * 1000 / prep.norm;
          var kgPerHour = kgPerMin * 60;
          resultEl.textContent = fmtNum(kgPerHour, 0);
        } else {
          resultEl.textContent = '—';
        }
      });

      card.querySelector('[data-action="toggle"]').addEventListener('click', function() {
        prep.active = !prep.active;
        saveState();
        renderPreparations();
      });
      card.querySelector('[data-action="edit"]').addEventListener('click', function() {
        state.editingPrepId = prep.id;
        renderPreparations();
      });
      armConfirmButton(card.querySelector('[data-action="delete"]'), function() {
        state.preparations = state.preparations.filter(function(p) { return p.id !== prep.id; });
        saveState();
        renderPreparations();
      });
    }

    list.appendChild(card);
  });
}

// Wake Lock: keep screen on while stopwatch is running.
var wakeLock = null;
function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  if (document.visibilityState !== 'visible') return;
  navigator.wakeLock.request('screen').then(function(lock) {
    wakeLock = lock;
    lock.addEventListener('release', function() { wakeLock = null; });
  }).catch(function(e) { /* ignore — not critical */ });
}
function releaseWakeLock() {
  if (wakeLock) {
    try { wakeLock.release(); } catch (e) {}
    wakeLock = null;
  }
}

function startTimer() {
  state.timer.elapsedMs = 0;
  state.timer.lastLapMs = 0;
  state.timer.frozenElapsedMs = 0;
  state.timer.running = true;
  state.timer.startMs = Date.now();
  state.streams.forEach(function(s) { s.after = ''; });
  vibrate(50);
  clearInterval(timerInterval);
  timerInterval = setInterval(tickTimer, 100);
  acquireWakeLock();
  saveState();
  renderTimer();
  renderStreams();
  updateSpeedDisplay();
}

function lapTimer() {
  if (state.timer.elapsedMs < 500) return; // захист від випадкового тапу
  // Split time = повний час від старту до цього моменту.
  state.timer.frozenElapsedMs = state.timer.elapsedMs;
  vibrate([40, 40, 80]);
  saveState();
  renderTimer();
  updateSpeedDisplay();
}

function resetTimer() {
  state.timer = { running: false, startMs: null, elapsedMs: 0, frozenElapsedMs: 0, lastLapMs: 0 };
  state.streams = [];
  clearInterval(timerInterval);
  releaseWakeLock();
  saveState();
  renderTimer();
  renderStreams();
  updateSpeedDisplay();
}

// Throttle saving the running timer to localStorage (once per ~3 s).
var lastTimerSaveMs = 0;
function tickTimer() {
  state.timer.elapsedMs = Date.now() - state.timer.startMs;
  document.getElementById('timerDisplay').textContent = fmtTime(state.timer.elapsedMs);
  var now = Date.now();
  if (now - lastTimerSaveMs > 3000) {
    lastTimerSaveMs = now;
    saveState();
  }
}

// ── SESSION ─────────────────────────────────────────────────────────────────

var sessionTicker = null;
var SESSION_PRESETS = [1000, 1100, 1250];
var PERMANENT_KINDS = ['Bag', 'Box'];

function uid() {
  return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

function fmtElapsedHMS(ms) {
  if (!isFinite(ms) || ms < 0) ms = 0;
  var totalSec = Math.floor(ms / 1000);
  var h = Math.floor(totalSec / 3600);
  var m = Math.floor((totalSec - h * 3600) / 60);
  var s = totalSec - h * 3600 - m * 60;
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function fmtClock(ts) {
  var d = new Date(ts);
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function fmtDate(ts) {
  var d = new Date(ts);
  return String(d.getDate()).padStart(2, '0') + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + d.getFullYear();
}

function nextSessionNumber() {
  var max = 0;
  state.sessions.forEach(function(s) { if (s.number > max) max = s.number; });
  if (state.session && state.session.number > max) max = state.session.number;
  return max + 1;
}

function createDraftSession() {
  state.session = {
    id: uid(),
    number: nextSessionNumber(),
    variety: '',
    containerTypes: [],
    activePrepIds: state.preparations.filter(function(p) { return p.active; }).map(function(p) { return p.id; }),
    canVolumes: {},
    startedAt: null,
    endedAt: null,
    paused: false,
    pauseStartedAt: null,
    totalPausedMs: 0,
    events: []
  };
  saveState();
}

function startSession() {
  if (!state.session) return;
  if (!state.session.containerTypes || state.session.containerTypes.length === 0) {
    alert(tr('needContainer'));
    return;
  }
  state.session.canVolumes = {};
  state.session.activePrepIds.forEach(function(pid) {
    var p = findPrep(pid);
    if (p) state.session.canVolumes[pid] = p.canVolume || 5;
  });
  var v = (state.session.variety || '').trim();
  if (v && state.varieties.indexOf(v) === -1) {
    state.varieties.unshift(v);
    if (state.varieties.length > 10) state.varieties.length = 10;
  }
  state.session.startedAt = Date.now();
  saveState();
  startSessionTicker();
  renderSessionView();
}

function pauseSession() {
  if (!state.session || !state.session.startedAt || state.session.paused || state.session.endedAt) return;
  state.session.paused = true;
  state.session.pauseStartedAt = Date.now();
  saveState();
  renderSessionView();
}

function resumeSession() {
  if (!state.session || !state.session.paused) return;
  state.session.totalPausedMs += Date.now() - state.session.pauseStartedAt;
  state.session.paused = false;
  state.session.pauseStartedAt = null;
  saveState();
  renderSessionView();
}

function endSession() {
  if (!state.session || !state.session.startedAt || state.session.endedAt) return;
  if (state.session.paused) {
    state.session.totalPausedMs += Date.now() - state.session.pauseStartedAt;
    state.session.paused = false;
    state.session.pauseStartedAt = null;
  }
  state.session.endedAt = Date.now();
  stopSessionTicker();
  saveState();
  renderSessionView();
}

function archiveSession() {
  if (!state.session || !state.session.endedAt) return;
  // If this session already exists in history (came from view), just clear it
  var alreadyInHistory = state.sessions.some(function(s) { return s.id === state.session.id; });
  if (!alreadyInHistory) {
    state.sessions.push(state.session);
  }
  state.session = null;
  // Return to history if we came from there, else to main
  if (alreadyInHistory) {
    state.view = 'history';
  } else {
    state.view = 'main';
  }
  saveState();
  renderViews();
}

function discardDraftSession() {
  if (!state.session) return;
  if (state.session.startedAt) return;
  state.session = null;
  state.view = 'main';
  saveState();
  renderViews();
}

function findPrep(pid) {
  for (var i = 0; i < state.preparations.length; i++) {
    if (state.preparations[i].id === pid) return state.preparations[i];
  }
  return null;
}

function sessionElapsedMs() {
  if (!state.session || !state.session.startedAt) return 0;
  var endTs = state.session.endedAt || Date.now();
  var pausedMs = state.session.totalPausedMs;
  if (state.session.paused) pausedMs += Date.now() - state.session.pauseStartedAt;
  return Math.max(0, endTs - state.session.startedAt - pausedMs);
}

function containerCount(typeId, sess) {
  var s = sess || state.session;
  if (!s) return 0;
  var c = 0;
  s.events.forEach(function(e) {
    if (e.type === 'container' && e.refId === typeId) c++;
  });
  return c;
}

function canisterCount(prepId, sess) {
  var s = sess || state.session;
  if (!s) return 0;
  var c = 0;
  s.events.forEach(function(e) {
    if (e.type === 'canister' && e.refId === prepId) c++;
  });
  return c;
}

function containerCorrectionKg(typeId, sess) {
  var s = sess || state.session;
  if (!s) return 0;
  var sum = 0;
  s.events.forEach(function(e) {
    if (e.type === 'container_corr' && e.refId === typeId) sum += (e.deltaKg || 0);
  });
  return sum;
}

function canisterCorrectionL(prepId, sess) {
  var s = sess || state.session;
  if (!s) return 0;
  var sum = 0;
  s.events.forEach(function(e) {
    if (e.type === 'canister_corr' && e.refId === prepId) sum += (e.deltaL || 0);
  });
  return sum;
}

function sessionTotalKg() {
  if (!state.session) return 0;
  var sum = 0;
  state.session.containerTypes.forEach(function(t) {
    sum += containerCount(t.id) * t.weight + containerCorrectionKg(t.id);
  });
  return sum;
}

function sessionPrepLiters(prepId) {
  if (!state.session) return 0;
  var v = state.session.canVolumes[prepId];
  if (v == null) {
    var p = findPrep(prepId);
    v = p ? (p.canVolume || 5) : 5;
  }
  return canisterCount(prepId) * v + canisterCorrectionL(prepId);
}

function addContainerType(weight, kind, size) {
  if (!state.session) return;
  state.session.containerTypes.push({
    id: uid(),
    weight: weight,
    kind: kind || 'ящик',
    size: size || ''
  });
  saveState();
  renderSessionView();
}

function updateContainerType(typeId, patch) {
  if (!state.session) return;
  var t = state.session.containerTypes.find(function(x) { return x.id === typeId; });
  if (!t) return;
  if (patch.weight != null) t.weight = patch.weight;
  if (patch.kind != null) t.kind = patch.kind;
  if (patch.size !== undefined) t.size = patch.size;
  saveState();
}

function applyContainerCorrection(typeId, deltaKg) {
  if (!state.session || !deltaKg) return;
  state.session.events.push({
    id: uid(),
    ts: Date.now(),
    type: 'container_corr',
    refId: typeId,
    deltaKg: deltaKg
  });
  vibrate(30);
  saveState();
}

function applyCanisterCorrection(prepId, deltaL) {
  if (!state.session || !deltaL) return;
  state.session.events.push({
    id: uid(),
    ts: Date.now(),
    type: 'canister_corr',
    refId: prepId,
    deltaL: deltaL
  });
  vibrate(30);
  saveState();
}

// Set count to specific value: adjust by adding or removing events
function setContainerCount(typeId, newCount) {
  if (!state.session) return;
  if (newCount < 0) newCount = 0;
  var current = containerCount(typeId);
  if (newCount === current) return;
  if (newCount > current) {
    var add = newCount - current;
    for (var i = 0; i < add; i++) {
      state.session.events.push({
        id: uid(), ts: Date.now() + i, type: 'container', refId: typeId
      });
    }
  } else {
    // remove (newest first) until count matches
    var toRemove = current - newCount;
    var idx = state.session.events.length - 1;
    while (toRemove > 0 && idx >= 0) {
      var e = state.session.events[idx];
      if (e.type === 'container' && e.refId === typeId) {
        state.session.events.splice(idx, 1);
        toRemove--;
      }
      idx--;
    }
  }
  saveState();
}

function setCanisterCount(prepId, newCount) {
  if (!state.session) return;
  if (newCount < 0) newCount = 0;
  var current = canisterCount(prepId);
  if (newCount === current) return;
  if (newCount > current) {
    var add = newCount - current;
    for (var i = 0; i < add; i++) {
      state.session.events.push({
        id: uid(), ts: Date.now() + i, type: 'canister', refId: prepId
      });
    }
  } else {
    var toRemove = current - newCount;
    var idx = state.session.events.length - 1;
    while (toRemove > 0 && idx >= 0) {
      var e = state.session.events[idx];
      if (e.type === 'canister' && e.refId === prepId) {
        state.session.events.splice(idx, 1);
        toRemove--;
      }
      idx--;
    }
  }
  saveState();
}

function removeContainerType(typeId) {
  if (!state.session) return;
  // Видаляємо тип і всі події з ним
  state.session.containerTypes = state.session.containerTypes.filter(function(t) { return t.id !== typeId; });
  state.session.events = state.session.events.filter(function(e) {
    return !(e.type === 'container' && e.refId === typeId);
  });
  state.editingCtypeId = null;
  saveState();
  renderSessionView();
}

function removePrepFromSession(prepId) {
  if (!state.session) return;
  state.session.activePrepIds = state.session.activePrepIds.filter(function(p) { return p !== prepId; });
  state.session.events = state.session.events.filter(function(e) {
    return !(e.type === 'canister' && e.refId === prepId);
  });
  delete state.session.canVolumes[prepId];
  state.editingPrepIdInSession = null;
  saveState();
  renderSessionView();
}

function addPrepToSession(prepId) {
  if (!state.session) return;
  if (state.session.activePrepIds.indexOf(prepId) !== -1) return;
  state.session.activePrepIds.push(prepId);
  var p = findPrep(prepId);
  if (p) state.session.canVolumes[prepId] = p.canVolume || 5;
  saveState();
  renderSessionView();
}

function deleteCurrentSession() {
  state.session = null;
  state.editingCtypeId = null;
  state.editingPrepIdInSession = null;
  state.view = 'main';
  stopSessionTicker();
  saveState();
  renderViews();
}

function addContainerEvent(typeId) {
  if (!state.session || !state.session.startedAt || state.session.endedAt) return;
  if (state.session.paused) return;
  state.session.events.push({ id: uid(), ts: Date.now(), type: 'container', refId: typeId });
  vibrate(30);
  saveState();
  renderSessionView();
}

function addCanisterEvent(prepId) {
  if (!state.session || !state.session.startedAt || state.session.endedAt) return;
  if (state.session.paused) return;
  state.session.events.push({ id: uid(), ts: Date.now(), type: 'canister', refId: prepId });
  vibrate([30, 30, 30]);
  saveState();
  renderSessionView();
}

function removeEvent(eventId) {
  if (!state.session) return;
  state.session.events = state.session.events.filter(function(e) { return e.id !== eventId; });
  saveState();
  renderSessionView();
}

function startSessionTicker() {
  if (sessionTicker) clearInterval(sessionTicker);
  sessionTicker = setInterval(function() {
    if (state.view !== 'session') return;
    if (!state.session || !state.session.startedAt || state.session.endedAt) {
      stopSessionTicker();
      return;
    }
    if (state.session.paused) return;
    var el = document.getElementById('sessionTimer');
    if (el) el.textContent = fmtElapsedHMS(sessionElapsedMs());
    var tEl = document.getElementById('sessionTonnage');
    if (tEl) tEl.textContent = fmtNum(sessionTotalKg());
  }, 1000);
}

function stopSessionTicker() {
  if (sessionTicker) clearInterval(sessionTicker);
  sessionTicker = null;
}

// ── VIEW ROUTING ────────────────────────────────────────────────────────────

function renderViews() {
  var mainEl = document.getElementById('mainView');
  var sessionEl = document.getElementById('sessionView');
  var historyEl = document.getElementById('historyView');
  if (state.view === 'session') {
    mainEl.classList.add('hidden');
    if (historyEl) historyEl.classList.add('hidden');
    sessionEl.classList.remove('hidden');
    renderSessionView();
  } else if (state.view === 'history') {
    mainEl.classList.add('hidden');
    sessionEl.classList.add('hidden');
    if (historyEl) {
      historyEl.classList.remove('hidden');
      renderHistoryView();
    }
  } else {
    sessionEl.classList.add('hidden');
    if (historyEl) historyEl.classList.add('hidden');
    mainEl.classList.remove('hidden');
    renderSessionEntry();
  }
}

function renderSessionEntry() {
  var btn = document.getElementById('sessionEntry');
  if (!btn) return;
  if (state.session && state.session.startedAt && !state.session.endedAt) {
    var elapsed = fmtElapsedHMS(sessionElapsedMs());
    var pausedTag = state.session.paused ? ' · ' + tr('paused') : '';
    btn.className = 'session-entry active';
    btn.innerHTML = '<div class="se-status">↻ ' + tr('sessionNumber') + state.session.number + ' · ' + elapsed + pausedTag + '</div>'
      + '<div class="se-meta">' + escapeHtml(state.session.variety || '—') + '</div>';
  } else if (state.session && !state.session.startedAt) {
    btn.className = 'session-entry';
    btn.innerHTML = '<div class="se-status">' + tr('sessionNumber') + state.session.number + ' · налаштування</div>';
  } else {
    btn.className = 'session-entry';
    btn.innerHTML = '<div class="se-status">+ ' + tr('newSession') + '</div>';
  }
}

function enterSessionView() {
  if (!state.session) {
    createDraftSession();
  }
  state.view = 'session';
  renderViews();
  if (state.session && state.session.startedAt && !state.session.endedAt) {
    startSessionTicker();
  }
}

function exitSessionView() {
  state.view = 'main';
  renderViews();
}

// ── SESSION VIEW RENDER ─────────────────────────────────────────────────────

function renderSessionView() {
  var root = document.getElementById('sessionView');
  if (!root) return;
  if (!state.session) {
    root.innerHTML = '';
    return;
  }
  if (state.session.endedAt) {
    renderSessionCompleted(root);
  } else if (state.session.startedAt) {
    renderSessionActive(root);
  } else {
    renderSessionPreStart(root);
  }
}

function renderSessionPreStart(root) {

function attachPreStartHandlers(root) {
  var s = state.session;
  if (window._dbg) window._dbg('attachPreStart, hasHandler=' + !!root._hasPreStartHandlers);

  // Avoid attaching listener multiple times on re-render
  if (root._hasPreStartHandlers) {
    var varietyInput2 = root.querySelector('#sessVariety');
    if (varietyInput2 && !varietyInput2._hasInputHandler) {
      varietyInput2._hasInputHandler = true;
      varietyInput2.addEventListener('input', function(e) {
        if (state.session) state.session.variety = e.target.value;
        saveState();
      });
    }
    return;
  }
  root._hasPreStartHandlers = true;
  if (window._dbg) window._dbg('preStart handlers ATTACHED');

  // Single delegated click handler on root
  root.addEventListener('click', function(e) {
    if (window._dbg) window._dbg('preStart click, session=' + (state.session ? 'yes' : 'no') + ', started=' + (state.session && state.session.startedAt ? 'yes' : 'no'));
    if (!state.session || state.session.startedAt) return;
    var sess = state.session;
    var target = e.target;

    if (target.closest('[data-action="discard"]')) {
      discardDraftSession();
      return;
    }

    var varietyChip = target.closest('[data-variety]');
    if (varietyChip) {
      sess.variety = varietyChip.getAttribute('data-variety');
      var vi = root.querySelector('#sessVariety');
      if (vi) vi.value = sess.variety;
      saveState();
      return;
    }

    var editCtype = target.closest('[data-edit-ctype-pre]');
    if (editCtype) {
      if (window._dbg) window._dbg('→ openContainerModal(edit)');
      openContainerModal(editCtype.getAttribute('data-edit-ctype-pre'));
      return;
    }

    if (target.closest('[data-action="addCtypePre"]')) {
      if (window._dbg) window._dbg('→ openContainerModal(new)');
      openContainerModal(null);
      return;
    }

    var togglePrep = target.closest('[data-toggle-prep]');
    if (togglePrep) {
      var pidStr = togglePrep.getAttribute('data-toggle-prep');
      var pidNum = Number(pidStr);
      var foundNum = state.preparations.some(function(p) { return p.id === pidNum; });
      var pid = foundNum ? pidNum : pidStr;
      var idx = sess.activePrepIds.indexOf(pid);
      if (idx === -1) idx = sess.activePrepIds.indexOf(String(pid));
      if (idx === -1) {
        sess.activePrepIds.push(pid);
      } else {
        sess.activePrepIds.splice(idx, 1);
      }
      saveState();
      renderSessionView();
      return;
    }

    if (target.closest('[data-action="start"]')) {
      if (window._dbg) window._dbg('→ startSession');
      startSession();
      return;
    }
  });

  var varietyInput = root.querySelector('#sessVariety');
  if (varietyInput && !varietyInput._hasInputHandler) {
    varietyInput._hasInputHandler = true;
    varietyInput.addEventListener('input', function(e) {
      if (state.session) state.session.variety = e.target.value;
      saveState();
    });
  }
}

function renderSessionActive(root) {
  var s = state.session;
  var html = '';

  // Header
  html += '<div class="session-header">';
  html += '<button class="session-back" data-action="back">' + tr('backBtn') + '</button>';

  html += '<div class="session-timer ' + (s.paused ? 'paused-text' : '') + '" id="sessionTimer">' + fmtElapsedHMS(sessionElapsedMs()) + '</div>';

    html += '<div class="session-paused-label">' + tr('paused') + '</div>';

    s.activePrepIds.forEach(function(pid) {
      var p = findPrep(pid);
      if (!p) return;
      var canVol = s.canVolumes[pid] || p.canVolume || 5;
      var liters = sessionPrepLiters(pid);
      var totalKg = sessionTotalKg();
      var actualMlPerTon = totalKg > 0 ? (liters * 1000 / (totalKg / 1000)) : null;
      var deviation = (actualMlPerTon !== null && p.norm > 0) ? (actualMlPerTon - p.norm) / p.norm * 100 : null;

      html += '</div>';

  var inactivePreps = state.preparations.filter(function(p) {
    return s.activePrepIds.indexOf(p.id) === -1;
